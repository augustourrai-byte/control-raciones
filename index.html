<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Raciones Faena</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.container{
display:flex;
height:100vh;
}

.menu{
width:250px;
background:#2c2c2c;
color:white;
padding:10px;
overflow:auto;
}

.menu button{
width:100%;
margin-bottom:6px;
padding:12px;
border:none;
background:#444;
color:white;
cursor:pointer;
}

.menu button:hover{
background:#666;
}

.content{
flex:1;
padding:20px;
overflow:auto;
background:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #ddd;
padding:6px;
text-align:left;
}

input,select{
padding:6px;
margin:3px;
}

.resumen{
background:#efefef;
padding:10px;
margin-bottom:10px;
}

</style>
</head>


<body>

<div class="container">

<div class="menu">

<button onclick="showModule('supervisores')">Venta supervisores</button>
<button onclick="showModule('produccion')">Producción</button>
<button onclick="showModule('sistema')">Venta sistema</button>
<button onclick="showModule('manual')">Venta manuales</button>
<button onclick="showModule('empresa')">Consumos por empresas</button>
<button onclick="showModule('servicio')">Consumos por servicios</button>
<button onclick="showModule('casino')">Consumos por casinos</button>
<button onclick="showModule('curva')">Curva mensual</button>
<button onclick="showModule('cobro')">Base de cobro</button>

</div>

<div class="content" id="content"></div>

</div>

<script>

const CASINOS = {
"A":"DP (PLANTA)",
"B":"DM (MINA)",
"C":"CAP",
"D":"AÑAÑUCAS",
"E":"CF",
"F":"CAES",
"G":"PDA 1"
}

let db = JSON.parse(localStorage.getItem("raciones_db")) || {

ventaSupervisores:[],
produccion:[],
ventaSistema:[],
ventaManual:[],
curvaMensual:[]

}

function saveDB(){
localStorage.setItem("raciones_db",JSON.stringify(db))
}

function showModule(name){

if(name==="supervisores") moduleSupervisores()
if(name==="produccion") moduleProduccion()
if(name==="sistema") moduleSistema()
if(name==="manual") moduleManual()
if(name==="empresa") moduleEmpresa()
if(name==="servicio") moduleServicio()
if(name==="casino") moduleCasino()
if(name==="curva") moduleCurva()
if(name==="cobro") moduleCobro()

}

function moduleSupervisores(){

let html=`

<h2>Venta Supervisores</h2>

<div class="resumen">
Ingreso simple por fecha / servicio / casino
</div>

Fecha <input type="date" id="sup_fecha">

Servicio <input id="sup_servicio">

Casino
<select id="sup_casino">
<option>DP (PLANTA)</option>
<option>DM (MINA)</option>
<option>CAP</option>
<option>AÑAÑUCAS</option>
<option>CF</option>
<option>CAES</option>
<option>PDA 1</option>
</select>

Cantidad <input type="number" id="sup_cantidad">

<button onclick="addSupervisor()">Guardar</button>

<h3>Resumen del día</h3>

<div id="sup_resumen"></div>

`

document.getElementById("content").innerHTML=html

renderSupervisorResumen()

}

function addSupervisor(){

let item={

fecha:document.getElementById("sup_fecha").value,
servicio:document.getElementById("sup_servicio").value,
casino:document.getElementById("sup_casino").value,
cantidad:Number(document.getElementById("sup_cantidad").value)

}

db.ventaSupervisores.push(item)

saveDB()

renderSupervisorResumen()

}

function renderSupervisorResumen(){

let map={}

db.ventaSupervisores.forEach(r=>{

let key=r.fecha+"_"+r.casino+"_"+r.servicio

if(!map[key]) map[key]=0

map[key]+=r.cantidad

})

let html="<table><tr><th>Fecha</th><th>Casino</th><th>Servicio</th><th>Cantidad</th></tr>"

Object.keys(map).forEach(k=>{

let parts=k.split("_")

html+=`<tr>
<td>${parts[0]}</td>
<td>${parts[1]}</td>
<td>${parts[2]}</td>
<td>${map[k]}</td>
</tr>`

})

html+="</table>"

document.getElementById("sup_resumen").innerHTML=html

}

function moduleProduccion(){

let html=`

<h2>Producción</h2>

Fecha <input type="date" id="prod_fecha">

Servicio <input id="prod_servicio">

Casino
<select id="prod_casino">
<option>DP (PLANTA)</option>
<option>DM (MINA)</option>
<option>CAP</option>
<option>AÑAÑUCAS</option>
<option>CF</option>
<option>CAES</option>
<option>PDA 1</option>
</select>

Cantidad <input type="number" id="prod_cantidad">

<button onclick="addProduccion()">Guardar</button>

<div id="prod_tabla"></div>

`

document.getElementById("content").innerHTML=html

renderProduccion()

}

function addProduccion(){

db.produccion.push({

fecha:document.getElementById("prod_fecha").value,
servicio:document.getElementById("prod_servicio").value,
casino:document.getElementById("prod_casino").value,
cantidad:Number(document.getElementById("prod_cantidad").value)

})

saveDB()

renderProduccion()

}

function renderProduccion(){

let html="<table><tr><th>Fecha</th><th>Casino</th><th>Servicio</th><th>Cantidad</th></tr>"

db.produccion.forEach(r=>{

html+=`<tr>
<td>${r.fecha}</td>
<td>${r.casino}</td>
<td>${r.servicio}</td>
<td>${r.cantidad}</td>
</tr>`

})

html+="</table>"

document.getElementById("prod_tabla").innerHTML=html

}

function moduleSistema(){

let html=`

<h2>Importar Venta Sistema</h2>

<input type="file" id="fileSistema">

<button onclick="importSistema()">Importar</button>

<div id="tablaSistema"></div>

`

document.getElementById("content").innerHTML=html

renderSistema()

}

function importSistema(){

let file=document.getElementById("fileSistema").files[0]

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let json=XLSX.utils.sheet_to_json(sheet)

json.forEach(r=>{

let casino=CASINOS[r.EQUIPO] || r.EQUIPO

db.ventaSistema.push({

fecha:r.FECHA,
empresa:r.NOMBRE_EMPRESA,
servicio:r.SERVICIO,
casino:casino,
cantidad:Number(r.PRECIO)

})

})

saveDB()

renderSistema()

}

reader.readAsArrayBuffer(file)

}

function renderSistema(){

let html="<table><tr><th>Fecha</th><th>Empresa</th><th>Servicio</th><th>Casino</th><th>Cantidad</th></tr>"

db.ventaSistema.forEach(r=>{

html+=`<tr>
<td>${r.fecha}</td>
<td>${r.empresa}</td>
<td>${r.servicio}</td>
<td>${r.casino}</td>
<td>${r.cantidad}</td>
</tr>`

})

html+="</table>"

document.getElementById("tablaSistema").innerHTML=html

}

function moduleManual(){

let html=`

<h2>Venta Manual</h2>

Fecha <input type="date" id="man_fecha">

Empresa <input id="man_empresa">

Servicio <input id="man_servicio">

Casino
<select id="man_casino">
<option>DP (PLANTA)</option>
<option>DM (MINA)</option>
<option>CAP</option>
<option>AÑAÑUCAS</option>
<option>CF</option>
<option>CAES</option>
<option>PDA 1</option>
</select>

Cantidad <input type="number" id="man_cantidad">

<button onclick="addManual()">Guardar</button>

<div id="tablaManual"></div>

`

document.getElementById("content").innerHTML=html

renderManual()

}

function addManual(){

db.ventaManual.push({

fecha:document.getElementById("man_fecha").value,
empresa:document.getElementById("man_empresa").value,
servicio:document.getElementById("man_servicio").value,
casino:document.getElementById("man_casino").value,
cantidad:Number(document.getElementById("man_cantidad").value)

})

saveDB()

renderManual()

}

function renderManual(){

let html="<table><tr><th>Fecha</th><th>Empresa</th><th>Servicio</th><th>Casino</th><th>Cantidad</th></tr>"

db.ventaManual.forEach(r=>{

html+=`<tr>
<td>${r.fecha}</td>
<td>${r.empresa}</td>
<td>${r.servicio}</td>
<td>${r.casino}</td>
<td>${r.cantidad}</td>
</tr>`

})

html+="</table>"

document.getElementById("tablaManual").innerHTML=html

}

function moduleEmpresa(){
document.getElementById("content").innerHTML="<h2>Consumos por empresas (próximo paso)</h2>"
}

function moduleServicio(){
document.getElementById("content").innerHTML="<h2>Consumos por servicios (próximo paso)</h2>"
}

function moduleCasino(){
document.getElementById("content").innerHTML="<h2>Consumos por casinos (próximo paso)</h2>"
}

function moduleCurva(){
document.getElementById("content").innerHTML="<h2>Curva mensual (próximo paso)</h2>"
}

function moduleCobro(){
document.getElementById("content").innerHTML="<h2>Base de cobro (próximo paso)</h2>"
}

showModule("supervisores")

</script>

</body>
</html>
