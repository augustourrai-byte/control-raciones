<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Operacional de Raciones</title>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root{
      --bg:#f3f5f9;
      --panel:#ffffff;
      --panel-soft:#f8fafc;
      --line:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;
      --dark:#111827;
      --dark-2:#1f2937;
      --primary:#2563eb;
      --primary-2:#1d4ed8;
      --success:#059669;
      --warning:#d97706;
      --danger:#dc2626;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      display:grid;
      grid-template-columns:300px 1fr;
      min-height:100vh;
    }

    .sidebar{
      background:linear-gradient(180deg,#111827 0%,#1f2937 100%);
      color:#fff;
      padding:22px 18px;
      position:sticky;
      top:0;
      height:100vh;
      overflow:auto;
    }

    .brand{
      padding:2px 6px 16px;
      border-bottom:1px solid rgba(255,255,255,.08);
      margin-bottom:18px;
    }

    .brand h1{
      margin:0 0 4px;
      font-size:22px;
      font-weight:800;
    }

    .brand p{
      margin:0;
      color:rgba(255,255,255,.7);
      font-size:13px;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:18px;
    }

    .menu-btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px 16px;
      background:rgba(255,255,255,.08);
      color:#fff;
      text-align:left;
      font-size:15px;
      cursor:pointer;
      transition:.18s ease;
    }

    .menu-btn:hover{
      background:rgba(255,255,255,.14);
      transform:translateY(-1px);
    }

    .menu-btn.active{
      background:#fff;
      color:#111827;
      font-weight:700;
    }

    .sidebar-card{
      margin-top:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:14px;
    }

    .sidebar-card h3{
      margin:0 0 10px;
      font-size:14px;
      color:#fff;
    }

    .sidebar-card label{
      display:block;
      font-size:12px;
      color:rgba(255,255,255,.78);
      margin:0 0 6px;
    }

    .sidebar-card select,
    .sidebar-card input{
      width:100%;
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      color:#111827;
      background:#fff;
    }

    .main{
      padding:24px;
      min-width:0;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .title-wrap h2{
      margin:0;
      font-size:34px;
      line-height:1.05;
    }

    .title-wrap p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      background:#eff6ff;
      color:#1d4ed8;
    }

    .tag.gray{
      background:#f1f5f9;
      color:#475569;
    }

    .tag.success{
      background:#ecfdf5;
      color:#047857;
    }

    .tag.warning{
      background:#fffbeb;
      color:#b45309;
    }

    .tag.danger{
      background:#fef2f2;
      color:#b91c1c;
    }

    .btn,
    .input,
    .select,
    .textarea{
      border-radius:12px;
      padding:11px 12px;
      font-size:14px;
      outline:none;
    }

    .input,.select,.textarea{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      width:100%;
    }

    .textarea{
      min-height:90px;
      resize:vertical;
    }

    .btn{
      border:none;
      cursor:pointer;
      background:var(--dark);
      color:#fff;
      font-weight:700;
    }

    .btn:hover{background:var(--dark-2)}
    .btn.primary{background:var(--primary)}
    .btn.primary:hover{background:var(--primary-2)}
    .btn.secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn.secondary:hover{background:var(--panel-soft)}
    .btn.danger{background:var(--danger)}
    .btn.danger:hover{filter:brightness(.95)}

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    .panel h3{
      margin:0 0 10px;
      font-size:20px;
    }

    .panel-sub{
      margin:-2px 0 14px;
      color:var(--muted);
      font-size:14px;
    }

    .grid{
      display:grid;
      gap:14px;
    }

    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .grid-5{grid-template-columns:repeat(5,minmax(0,1fr))}
    .grid-6{grid-template-columns:repeat(6,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}

    .kpi{
      background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      min-height:98px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .kpi .label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .kpi .value{
      font-size:32px;
      font-weight:800;
      line-height:1;
      letter-spacing:-.4px;
    }

    .kpi .sub{
      font-size:12px;
      color:var(--muted);
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .flex{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .notice{
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#f8fafc;
      color:#334155;
      font-size:14px;
    }

    .empty{
      border:1px dashed var(--line);
      border-radius:16px;
      background:#fcfcfd;
      color:var(--muted);
      text-align:center;
      padding:24px;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:900px;
    }

    th,td{
      border-bottom:1px solid var(--line);
      padding:11px 12px;
      text-align:left;
      font-size:14px;
      white-space:nowrap;
    }

    th{
      background:#f8fafc;
      color:#334155;
      text-transform:uppercase;
      font-size:12px;
      letter-spacing:.4px;
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:last-child td{border-bottom:none}
    .right{text-align:right}
    .muted{color:var(--muted)}
    .success-text{color:var(--success);font-weight:800}
    .warning-text{color:var(--warning);font-weight:800}
    .danger-text{color:var(--danger);font-weight:800}

    .matrix-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    .matrix-table{
      width:max-content;
      min-width:100%;
      border-collapse:collapse;
      background:#fff;
    }

    .matrix-table th,
    .matrix-table td{
      border-bottom:1px solid var(--line);
      border-right:1px solid var(--line);
      padding:10px 12px;
      font-size:13px;
      white-space:nowrap;
    }

    .matrix-table th{
      background:#f8fafc;
      text-transform:none;
      font-size:12px;
      font-weight:800;
      color:#334155;
    }

    .matrix-table th:first-child,
    .matrix-table td:first-child{
      position:sticky;
      left:0;
      z-index:2;
      background:#fff;
      min-width:320px;
      max-width:320px;
    }

    .matrix-table th:first-child{
      z-index:3;
      background:#f8fafc;
    }

    .matrix-row:hover td{
      background:#fafcff;
    }

    .tree-cell{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .tree-indent{
      display:inline-block;
      width:calc(var(--level, 0) * 18px);
      flex:0 0 auto;
    }

    .tree-toggle{
      width:24px;
      height:24px;
      border-radius:8px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:800;
      color:#475569;
      flex:0 0 auto;
    }

    .tree-toggle:hover{
      background:#f8fafc;
    }

    .tree-spacer{
      width:24px;
      flex:0 0 auto;
    }

    .tree-label{
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight:700;
    }

    .row-level-0 .tree-label{font-weight:800}
    .row-level-1 .tree-label{font-weight:700}
    .row-level-2 .tree-label{font-weight:600;color:#334155}

    .sticky-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    @media (max-width: 1250px){
      .grid-6{grid-template-columns:repeat(3,minmax(0,1fr))}
      .grid-5{grid-template-columns:repeat(3,minmax(0,1fr))}
      .form-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    }

    @media (max-width: 980px){
      .app{grid-template-columns:1fr}
      .sidebar{
        position:relative;
        height:auto;
      }
      .grid-4,.grid-3,.grid-2{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
      .title-wrap h2{font-size:28px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Control Raciones</h1>
        <p>Histórico mensual · matrices por fecha · base de cobro</p>
      </div>

      <div class="sidebar-card">
        <h3>Perfil</h3>
        <label>Modo de visualización</label>
        <select id="perfilSelector">
          <option value="ADMIN">Administrador</option>
          <option value="SUPERVISOR">Supervisor</option>
        </select>
      </div>

      <div class="sidebar-card">
        <h3>Período activo</h3>
        <label>Mes de trabajo</label>
        <input type="month" id="periodoSelector" />
      </div>

      <nav class="menu" id="menu"></nav>

      <div class="sidebar-card">
        <h3>Base local</h3>
        <div class="flex">
          <button class="btn danger" id="btnReset" style="width:100%">Reset local</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title-wrap">
          <h2 id="pageTitle">Venta supervisores</h2>
          <p id="pageSubtitle">Captura y control operacional por período.</p>
        </div>

        <div class="toolbar">
          <span class="tag gray" id="perfilTag">ADMINISTRADOR</span>
          <span class="tag" id="periodoTag"></span>
          <div class="sticky-actions">
            <button class="btn secondary" id="btnExportExcel">Exportar Excel</button>
            <button class="btn secondary" id="btnExportPDF">Exportar PDF</button>
          </div>
        </div>
      </div>

      <div id="appContent"></div>
    </main>
  </div>

  <datalist id="empresasList"></datalist>
  <datalist id="serviciosList"></datalist>

  <script>
    const DB_NAME = "control_raciones_db_v2";
    const DB_VERSION = 1;
    const DB_STORE = "appdata";
    const DB_KEY = "main";
    const SETTINGS_KEY = "control_raciones_settings_v2";

    const MENU_ITEMS = [
      { key:"supervisores", label:"Venta supervisores", roles:["ADMIN","SUPERVISOR"] },
      { key:"produccion", label:"Producción", roles:["ADMIN"] },
      { key:"sistema", label:"Venta sistema", roles:["ADMIN"] },
      { key:"manual", label:"Venta manuales", roles:["ADMIN"] },
      { key:"empresa", label:"Consumos por empresas", roles:["ADMIN"] },
      { key:"servicio", label:"Consumos por servicios", roles:["ADMIN"] },
      { key:"casino", label:"Consumos por casinos", roles:["ADMIN"] },
      { key:"curva", label:"Curva mensual", roles:["ADMIN"] },
      { key:"cobro", label:"Base de cobro", roles:["ADMIN"] }
    ];

    const CASINOS = [
      "DP (PLANTA)",
      "DM (MINA)",
      "CAP",
      "AÑAÑUCAS",
      "CF",
      "CAES",
      "PDA 1"
    ];

    const EQUIPO_MAP = {
      "A":"DP (PLANTA)",
      "B":"DM (MINA)",
      "C":"CAP",
      "D":"AÑAÑUCAS",
      "E":"CF",
      "F":"CAES",
      "G":"PDA 1"
    };

    const DEFAULT_DB = {
      ventaSupervisores: [],
      produccion: [],
      ventaSistema: [],
      ventaManual: [],
      curvaMensual: [],
      maestros: {
        empresas: [],
        servicios: [
          "DESAYUNO",
          "ALMUERZO",
          "CENA",
          "CENA TRASNOCHE",
          "COLACION REFORZADA",
          "COLACION CORDILLERA",
          "COLACION TERRENO",
          "PERMUTA DESAYUNO",
          "PERMUTA ALMUERZO",
          "PERMUTA CENA",
          "PERMUTA CENA 24H",
          "PERMUTA CENA TRASNOCHE",
          "AGUAS 500CC",
          "BIDONES",
          "COFFEE STANDARD",
          "COFFEE PLUS",
          "COFFEE BASICO"
        ]
      }
    };

    const DEFAULT_SETTINGS = {
      perfil: "ADMIN",
      periodo: getCurrentMonth(),
      currentModule: "supervisores"
    };

    let db = structuredCloneSafe(DEFAULT_DB);
    let settings = loadSettings();
    let currentExport = { headers: [], rows: [], filename: "exportacion" };

    const treeState = {
      empresa: new Set(),
      servicio: new Set(),
      casino: new Set()
    };

    function structuredCloneSafe(obj){
      return JSON.parse(JSON.stringify(obj));
    }

    function getCurrentMonth(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    }

    function loadSettings(){
      const raw = localStorage.getItem(SETTINGS_KEY);
      if(!raw){
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(DEFAULT_SETTINGS));
        return structuredCloneSafe(DEFAULT_SETTINGS);
      }
      try{
        return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
      }catch{
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(DEFAULT_SETTINGS));
        return structuredCloneSafe(DEFAULT_SETTINGS);
      }
    }

    function saveSettings(){
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function openIndexedDb(){
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = function(event){
          const database = event.target.result;
          if(!database.objectStoreNames.contains(DB_STORE)){
            database.createObjectStore(DB_STORE);
          }
        };

        request.onsuccess = function(){
          resolve(request.result);
        };

        request.onerror = function(){
          reject(request.error);
        };
      });
    }

    async function loadDb(){
      try{
        const database = await openIndexedDb();
        return await new Promise((resolve, reject) => {
          const tx = database.transaction(DB_STORE, "readonly");
          const store = tx.objectStore(DB_STORE);
          const request = store.get(DB_KEY);

          request.onsuccess = function(){
            const parsed = request.result;
            if(!parsed){
              resolve(structuredCloneSafe(DEFAULT_DB));
              return;
            }

            resolve({
              ventaSupervisores: parsed.ventaSupervisores || [],
              produccion: parsed.produccion || [],
              ventaSistema: parsed.ventaSistema || [],
              ventaManual: parsed.ventaManual || [],
              curvaMensual: parsed.curvaMensual || [],
              maestros: {
                empresas: parsed?.maestros?.empresas || [],
                servicios: parsed?.maestros?.servicios || DEFAULT_DB.maestros.servicios
              }
            });
          };

          request.onerror = function(){
            reject(request.error);
          };
        });
      }catch(error){
        console.error("Error cargando IndexedDB:", error);
        return structuredCloneSafe(DEFAULT_DB);
      }
    }

    async function saveDb(){
      try{
        const database = await openIndexedDb();
        await new Promise((resolve, reject) => {
          const tx = database.transaction(DB_STORE, "readwrite");
          const store = tx.objectStore(DB_STORE);
          const request = store.put(db, DB_KEY);

          request.onsuccess = function(){ resolve(); };
          request.onerror = function(){ reject(request.error); };
        });
      }catch(error){
        console.error("Error guardando IndexedDB:", error);
        throw error;
      }
    }

    function normalizeText(v){
      return String(v || "").trim().replace(/\s+/g," ").toUpperCase();
    }

    function normalizeServiceFamily(servicio){
      const s = normalizeText(servicio);
      if(s === "COLACION TERRENO") return "COLACION TERRENO";
      if(s.includes("PERMUTA")) return "COLACION TERRENO";
      return s;
    }

    function parseDateToISO(value){
      if(value === null || value === undefined || value === "") return "";
      if(typeof value === "number"){
        const d = XLSX.SSF.parse_date_code(value);
        if(d && d.y && d.m && d.d){
          return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`;
        }
      }

      const s = String(value).trim();
      if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

      let m = s.match(/^(\d{2})-(\d{2})-(\d{4})$/);
      if(m) return `${m[3]}-${m[2]}-${m[1]}`;

      m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if(m) return `${m[3]}-${m[2]}-${m[1]}`;

      m = s.match(/^(\d{4})\/(\d{2})\/(\d{2})$/);
      if(m) return `${m[1]}-${m[2]}-${m[3]}`;

      return "";
    }

    function monthOf(fecha){
      return String(fecha || "").slice(0,7);
    }

    function inSelectedMonth(fecha){
      return monthOf(fecha) === settings.periodo;
    }

    function formatNumber(n){
      return new Intl.NumberFormat("es-CL", { maximumFractionDigits: 2 }).format(Number(n || 0));
    }

    function csvValue(v){
      const s = String(v ?? "");
      if(s.includes(";") || s.includes('"') || s.includes("\n")){
        return `"${s.replace(/"/g,'""')}"`;
      }
      return s;
    }

    function ensureMasters(empresa, servicio){
      const e = normalizeText(empresa);
      const s = normalizeText(servicio);
      if(e && !db.maestros.empresas.includes(e)) db.maestros.empresas.push(e);
      if(s && !db.maestros.servicios.includes(s)) db.maestros.servicios.push(s);
      db.maestros.empresas.sort((a,b)=>a.localeCompare(b));
      db.maestros.servicios.sort((a,b)=>a.localeCompare(b));
    }

    function getVisibleMenuItems(){
      return MENU_ITEMS.filter(item => item.roles.includes(settings.perfil));
    }

    function ensureCurrentModuleAllowed(){
      const allowed = getVisibleMenuItems().map(x => x.key);
      if(!allowed.includes(settings.currentModule)){
        settings.currentModule = allowed[0];
        saveSettings();
      }
    }

    function setHeader(title, subtitle){
      document.getElementById("pageTitle").textContent = title;
      document.getElementById("pageSubtitle").textContent = subtitle;
      document.getElementById("perfilTag").textContent = settings.perfil === "ADMIN" ? "ADMINISTRADOR" : "SUPERVISOR";
      document.getElementById("periodoTag").textContent = `PERÍODO ${settings.periodo}`;
    }

    function renderMenu(){
      ensureCurrentModuleAllowed();
      const menu = document.getElementById("menu");
      menu.innerHTML = getVisibleMenuItems().map(item => `
        <button class="menu-btn ${settings.currentModule === item.key ? "active" : ""}" data-module="${item.key}">
          ${item.label}
        </button>
      `).join("");

      menu.querySelectorAll(".menu-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          settings.currentModule = btn.dataset.module;
          saveSettings();
          renderApp();
        });
      });
    }

    function updateDatalists(){
      document.getElementById("empresasList").innerHTML = db.maestros.empresas
        .map(x => `<option value="${x}"></option>`).join("");
      document.getElementById("serviciosList").innerHTML = db.maestros.servicios
        .map(x => `<option value="${x}"></option>`).join("");
    }

    function renderSummaryCards(items){
      const cls = items.length === 4 ? "grid-4" : items.length === 3 ? "grid-3" : "grid-4";
      return `<div class="grid ${cls}">` + items.map(item => `
        <div class="kpi">
          <div class="label">${item.label}</div>
          <div class="value">${item.value}</div>
          <div class="sub">${item.sub || ""}</div>
        </div>
      `).join("") + `</div>`;
    }

    function getVentasSupervisoresMes(){
      return db.ventaSupervisores.filter(x => inSelectedMonth(x.fecha));
    }

    function getProduccionMes(){
      return db.produccion.filter(x => inSelectedMonth(x.fecha));
    }

    function getVentaRealMes(){
      const sistema = getVentasSistemaMes().map(x => ({ ...x, origen:"SISTEMA" }));
      const manual = getVentasManualMes().map(x => ({ ...x, origen:"MANUAL" }));

    }

    function getSelectedDates(rows){
      return [...new Set(rows.map(x => x.fecha).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
    }

    function buildTree(rows, levels){
      const root = [];

      function findChild(children, label){
        let node = children.find(x => x.label === label);
        if(!node){
          node = { label, children: [], totalsByDate: {}, total: 0 };
          children.push(node);
        }
        return node;
      }

      rows.forEach(row => {
        let current = root;
        levels.forEach(level => {
          const label = row[level] || "SIN DATO";
          const node = findChild(current, label);
          const date = row.fecha;
          const amount = Number(row.cantidad || 0);

          node.totalsByDate[date] = (node.totalsByDate[date] || 0) + amount;
          node.total += amount;
          current = node.children;
        });
      });

      function sortNodes(nodes){
        nodes.sort((a,b)=>a.label.localeCompare(b.label));
        nodes.forEach(n => sortNodes(n.children));
      }

      sortNodes(root);
      return root;
    }

    function flattenTree(nodes, moduleKey, dates, level = 0, parentPath = ""){
      const result = [];
      nodes.forEach(node => {
        const path = parentPath ? `${parentPath}|||${node.label}` : node.label;
        const hasChildren = node.children.length > 0;
        const expanded = treeState[moduleKey].has(path);

        result.push({
          path,
          label: node.label,
          level,
          hasChildren,
          expanded,
          totalsByDate: node.totalsByDate,
          total: node.total
        });

        if(hasChildren && expanded){
          result.push(...flattenTree(node.children, moduleKey, dates, level + 1, path));
        }
      });
      return result;
    }

    function renderMatrixTable(moduleKey, levels, rows, firstColumnLabel, filenameBase){
      const dates = getSelectedDates(rows);
      const tree = buildTree(rows, levels);
      const flat = flattenTree(tree, moduleKey, dates);

      currentExport = {
        headers: [firstColumnLabel, ...dates, "Total"],
        rows: flat.map(r => [
          `${"  ".repeat(r.level)}${r.label}`,
          ...dates.map(d => r.totalsByDate[d] || 0),
          r.total
        ]),
        filename: `${filenameBase}_${settings.periodo}`
      };

      if(!dates.length){
        return `<div class="empty">No hay información para el período seleccionado.</div>`;
      }

      return `
        <div class="matrix-wrap">
          <table class="matrix-table">
            <thead>
              <tr>
                <th>${firstColumnLabel}</th>
                ${dates.map(d => `<th class="right">${d}</th>`).join("")}
                <th class="right">Total</th>
              </tr>
            </thead>
            <tbody>
              ${
                flat.length
                ? flat.map(r => `
                    <tr class="matrix-row row-level-${r.level}">
                      <td>
                        <div class="tree-cell">
                          <span class="tree-indent" style="--level:${r.level}"></span>
                          ${
                            r.hasChildren
                            ? `<button class="tree-toggle" data-tree-module="${moduleKey}" data-tree-path="${encodeURIComponent(r.path)}">${r.expanded ? "−" : "+"}</button>`
                            : `<span class="tree-spacer"></span>`
                          }
                          <span class="tree-label">${r.label}</span>
                        </div>
                      </td>
                      ${dates.map(d => `<td class="right">${formatNumber(r.totalsByDate[d] || 0)}</td>`).join("")}
                      <td class="right"><strong>${formatNumber(r.total)}</strong></td>
                    </tr>
                  `).join("")
                : `<tr><td colspan="${dates.length + 2}"><div class="empty">No hay filas para mostrar.</div></td></tr>`
              }
            </tbody>
          </table>
        </div>
      `;
    }

    function bindTreeToggles(){

        btn.addEventListener("click", () => {
          const moduleKey = btn.dataset.treeModule;
          const path = decodeURIComponent(btn.dataset.treePath);
          if(treeState[moduleKey].has(path)){
            treeState[moduleKey].delete(path);
          }else{
            treeState[moduleKey].add(path);
          }
          renderApp();
        });
      });
    }

    async function importSistemaFromFile(){
      const input = document.getElementById("fileSistema");
      const file = input.files[0];
      const out = document.getElementById("resultadoImportacionSistema");

      if(!file){
        alert("Selecciona un archivo antes de importar.");
        return;
      }

      out.innerHTML = `<div class="notice">Procesando archivo...</div>`;

      const reader = new FileReader();

      reader.onload = async function(e){
        try{
          const data = e.target.result;
          let workbook;

          if(file.name.toLowerCase().endsWith(".csv")){
            workbook = XLSX.read(data, { type:"string" });
          }else{
            workbook = XLSX.read(new Uint8Array(data), { type:"array" });
          }

          const firstSheet = workbook.SheetNames[0];
          const sheet = workbook.Sheets[firstSheet];
          const rows = XLSX.utils.sheet_to_json(sheet, { defval:"" });

          if(!rows.length){
            out.innerHTML = `<div class="notice">El archivo no contiene filas válidas.</div>`;
            return;
          }

          const normalizedHeaders = Object.keys(rows[0]).map(h => normalizeText(h));
          const requiredHeaders = ["NOMBRE_EMPRESA","SERVICIO","FECHA","EQUIPO","PRECIO"];
          const missing = requiredHeaders.filter(h => !normalizedHeaders.includes(h));

          if(missing.length){
            out.innerHTML = `<div class="notice">Faltan columnas obligatorias: <strong>${missing.join(", ")}</strong></div>`;
            return;
          }

          const getValue = (row, headerName) => {
            const originalKey = Object.keys(row).find(k => normalizeText(k) === headerName);
            return originalKey ? row[originalKey] : "";
          };

          const grouped = {};
          let rawRows = 0;
          let total = 0;

          rows.forEach(row => {
            const empresa = normalizeText(getValue(row, "NOMBRE_EMPRESA"));
            const servicio = normalizeText(getValue(row, "SERVICIO"));
            const fecha = parseDateToISO(getValue(row, "FECHA"));
            const equipo = normalizeText(getValue(row, "EQUIPO"));
            const casino = EQUIPO_MAP[equipo] || equipo || "SIN MAPEO";

            let cantidadRaw = getValue(row, "PRECIO");
            if(typeof cantidadRaw === "string"){
              cantidadRaw = cantidadRaw.replace(/\./g,"").replace(",",".");
            }
            const cantidad = Number(cantidadRaw);

            if(!empresa || !servicio || !fecha || !casino || Number.isNaN(cantidad)) return;

            const key = `${fecha}|${empresa}|${servicio}|${casino}`;
            if(!grouped[key]){
              grouped[key] = {
                id: `${Date.now()}_${Math.random()}`,
                fecha,
                empresa,
                servicio,
                familia: normalizeServiceFamily(servicio),
                casino,
                cantidad: 0
              };
            }

            grouped[key].cantidad += cantidad;
            rawRows += 1;
            total += cantidad;
          });

          const imported = Object.values(grouped);
          imported.forEach(r => {
            db.ventaSistema.push(r);
            ensureMasters(r.empresa, r.servicio);
          });

          await saveDb();

          out.innerHTML = `
            <div class="notice">
              ✔ Filas fuente leídas: <strong>${formatNumber(rawRows)}</strong><br>
              ✔ Registros consolidados importados: <strong>${formatNumber(imported.length)}</strong><br>
              ✔ Cantidad total sumada: <strong>${formatNumber(total)}</strong>
            </div>
          `;

          renderApp();
        }catch(error){
          out.innerHTML = `<div class="notice">Error al leer el archivo: <strong>${error.message}</strong></div>`;
        }
      };

      if(file.name.toLowerCase().endsWith(".csv")){
        reader.readAsText(file, "utf-8");
      }else{
        reader.readAsArrayBuffer(file);
      }
    }

    function renderManualModule(){

    function getCobroRows(){
      const realRows = getVentaRealMes();
      const map = new Map();

      realRows.forEach(r => {
        const key = `${settings.periodo}|${r.empresa}|${r.servicio}`;
        if(!map.has(key)){
          map.set(key, {
            periodo: settings.periodo,
            empresa: r.empresa,
            servicio: r.servicio,
            familia: r.familia,
            sistema: 0,
            manual: 0,
            real: 0,
            curva: 0,
            cobro: 0,
            regla: ""
          });
        }
        const obj = map.get(key);
        if(r.origen === "SISTEMA") obj.sistema += Number(r.cantidad || 0);
        if(r.origen === "MANUAL") obj.manual += Number(r.cantidad || 0);
        obj.real += Number(r.cantidad || 0);
      });

      getCurvaMes().forEach(r => {
        const key = `${r.periodo}|${r.empresa}|${r.servicio}`;
        if(!map.has(key)){
          map.set(key, {
            periodo: r.periodo,
            empresa: r.empresa,
            servicio: r.servicio,
            familia: r.familia,
            sistema: 0,
            manual: 0,
            real: 0,
            curva: 0,
            cobro: 0,
            regla: ""
          });
        }
        map.get(key).curva += Number(r.cantidad || 0);
      });

      return [...map.values()].map(r => {
        const cobro = Math.max(r.real, r.curva);
        let regla = "REAL = CURVA";
        if(cobro === r.real && cobro !== r.curva) regla = "COBRA REAL";
        if(cobro === r.curva && cobro !== r.real) regla = "COBRA CURVA";
        return { ...r, cobro, regla };
      }).sort((a,b)=>(a.empresa+a.servicio).localeCompare(b.empresa+b.servicio));
    }

    async function resetDatabase(){
      if(!confirm("Esto borrará toda la información guardada en este navegador.")) return;

      try{
        const database = await openIndexedDb();
        await new Promise((resolve, reject) => {
          const tx = database.transaction(DB_STORE, "readwrite");
          const store = tx.objectStore(DB_STORE);
          const request = store.delete(DB_KEY);
          request.onsuccess = function(){ resolve(); };
          request.onerror = function(){ reject(request.error); };
        });

        localStorage.removeItem(SETTINGS_KEY);
        db = structuredCloneSafe(DEFAULT_DB);
        settings = loadSettings();
        treeState.empresa.clear();
        treeState.servicio.clear();
        treeState.casino.clear();
        updateDatalists();
        renderApp();
      }catch(error){
        console.error(error);
        alert("No se pudo limpiar la base local.");
      }
    }

    function exportCurrentExcel(){
      const ws = XLSX.utils.aoa_to_sheet([currentExport.headers, ...currentExport.rows]);

      XLSX.writeFile(wb, `${currentExport.filename}.xlsx`);
    }

    function exportCurrentPDF(){
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation: currentExport.headers.length > 8 ? "landscape" : "portrait",
        unit: "pt",
        format: "a4"
      });

      doc.setFontSize(14);
      doc.text(currentExport.filename.replace(/_/g, " ").toUpperCase(), 40, 36);

      doc.autoTable({
        head: [currentExport.headers],
        body: currentExport.rows.map(row => row.map(cell => {
          if(typeof cell === "number") return formatNumber(cell);
          return String(cell ?? "");
        })),
        startY: 52,
        styles: {
          fontSize: 8,
          cellPadding: 4
        },
        headStyles: {
          fillColor: [37, 99, 235]
        },
        theme: "grid",
        margin: { left: 24, right: 24 }
      });

      doc.save(`${currentExport.filename}.pdf`);
    }

          break;
        case "sistema":
          renderSistemaModule();

          break;
        case "servicio":
          renderConsumoServicioModule();
          break;
        case "casino":

          break;
        case "curva":
          renderCurvaModule();
          break;
        case "cobro":
          renderCobroModule();
          break;
        default:
          settings.currentModule = "supervisores";
          saveSettings();
          renderSupervisorModule();
          break;
      }
    }

    async function initApp(){
      db = await loadDb();
      bindGlobalControls();
      renderApp();
    }

    initApp();
  </script>
</body>
</html>
