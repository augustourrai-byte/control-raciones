<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control Operacional de Raciones</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="flex">

<!-- SIDEBAR -->

<div class="w-64 bg-slate-900 text-white min-h-screen p-4">

<h1 class="text-xl font-bold mb-6">
Control Raciones
</h1>

<ul class="space-y-2">

<li onclick="mostrar('dashboard')" class="cursor-pointer bg-slate-700 p-2 rounded">Dashboard</li>
<li onclick="mostrar('ingreso')" class="cursor-pointer p-2">Ingreso raciones</li>
<li onclick="mostrar('historial')" class="cursor-pointer p-2">Histórico</li>

</ul>

</div>

<!-- CONTENIDO -->

<div class="flex-1 p-8">

<!-- DASHBOARD -->

<div id="dashboard">

<h2 class="text-2xl font-bold mb-6">Dashboard Operacional</h2>

<div class="grid grid-cols-4 gap-4">

<div class="bg-white p-4 rounded shadow">
<p class="text-gray-500 text-sm">Curva total</p>
<p id="curvaTotal" class="text-3xl font-bold">0</p>
</div>

<div class="bg-white p-4 rounded shadow">
<p class="text-gray-500 text-sm">Real</p>
<p id="realTotal" class="text-3xl font-bold">0</p>
</div>

<div class="bg-white p-4 rounded shadow">
<p class="text-gray-500 text-sm">Cobro</p>
<p id="cobroTotal" class="text-3xl font-bold">0</p>
</div>

<div class="bg-white p-4 rounded shadow">
<p class="text-gray-500 text-sm">Producción sugerida</p>
<p id="produccionTotal" class="text-3xl font-bold">0</p>
</div>

</div>

</div>

<!-- INGRESO -->

<div id="ingreso" class="hidden">

<h2 class="text-2xl font-bold mb-6">
Ingreso de raciones
</h2>

<div class="bg-white p-6 rounded shadow">

<div class="grid grid-cols-4 gap-4">

<input id="empresa" placeholder="Empresa"
class="border p-2 rounded">

<input id="servicio" placeholder="Servicio"
class="border p-2 rounded">

<input id="curva" type="number"
placeholder="Curva"
class="border p-2 rounded">

<input id="real" type="number"
placeholder="Real"
class="border p-2 rounded">

</div>

<button onclick="guardar()"
class="mt-4 bg-slate-900 text-white px-4 py-2 rounded">

Guardar registro

</button>

</div>

</div>

<!-- HISTORIAL -->

<div id="historial" class="hidden mt-10">

<h2 class="text-2xl font-bold mb-6">
Histórico
</h2>

<div class="bg-white p-6 rounded shadow">

<table class="w-full">

<thead>
<tr class="border-b text-left">

<th class="p-2">Empresa</th>
<th class="p-2">Servicio</th>
<th class="p-2">Curva</th>
<th class="p-2">Real</th>
<th class="p-2">Cobro</th>
<th class="p-2"></th>

</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

</div>

</div>

<script>

let datos = JSON.parse(localStorage.getItem("raciones") || "[]")

function mostrar(seccion){

document.getElementById("dashboard").classList.add("hidden")
document.getElementById("ingreso").classList.add("hidden")
document.getElementById("historial").classList.add("hidden")

document.getElementById(seccion).classList.remove("hidden")

}

function guardar(){

let empresa = document.getElementById("empresa").value
let servicio = document.getElementById("servicio").value
let curva = Number(document.getElementById("curva").value)
let real = Number(document.getElementById("real").value)

if(!empresa || !servicio){

alert("Debe ingresar empresa y servicio")
return

}

let cobro = Math.max(curva, real)

datos.push({
empresa,
servicio,
curva,
real,
cobro
})

localStorage.setItem("raciones", JSON.stringify(datos))

limpiar()

render()

mostrar("historial")

}

function eliminar(i){

datos.splice(i,1)

localStorage.setItem("raciones", JSON.stringify(datos))

render()

}

function limpiar(){

document.getElementById("empresa").value=""
document.getElementById("servicio").value=""
document.getElementById("curva").value=""
document.getElementById("real").value=""

}

function render(){

let tabla = document.getElementById("tabla")

tabla.innerHTML=""

let curvaTotal=0
let realTotal=0
let cobroTotal=0

datos.forEach((d,i)=>{

curvaTotal += d.curva
realTotal += d.real
cobroTotal += d.cobro

tabla.innerHTML += `
<tr class="border-b">

<td class="p-2">${d.empresa}</td>
<td class="p-2">${d.servicio}</td>
<td class="p-2">${d.curva}</td>
<td class="p-2">${d.real}</td>
<td class="p-2">${d.cobro}</td>

<td class="p-2">
<button onclick="eliminar(${i})"
class="text-red-600">
Eliminar
</button>
</td>

</tr>
`

})

document.getElementById("curvaTotal").innerText = curvaTotal
document.getElementById("realTotal").innerText = realTotal
document.getElementById("cobroTotal").innerText = cobroTotal
document.getElementById("produccionTotal").innerText = Math.max(curvaTotal, realTotal)

}

render()

</script>

</body>
</html>
