<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Operacional de Raciones</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root{
      --bg:#f3f5f9;
      --panel:#ffffff;
      --panel-soft:#f8fafc;
      --line:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;
      --dark:#0f172a;
      --dark-2:#1e293b;
      --primary:#2563eb;
      --primary-2:#1d4ed8;
      --success:#059669;
      --warning:#d97706;
      --danger:#dc2626;
      --radius:18px;
      --shadow:0 10px 30px rgba(15,23,42,.08);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .hidden{display:none!important}

    .app-shell{
      display:grid;
      grid-template-columns:300px 1fr;
      min-height:100vh;
    }

    .sidebar{
      background:linear-gradient(180deg,#0f172a 0%, #1e293b 100%);
      color:#fff;
      padding:22px 18px;
      position:sticky;
      top:0;
      height:100vh;
      overflow:auto;
      border-right:1px solid rgba(255,255,255,.06);
    }

    .brand{
      padding:4px 8px 18px;
      border-bottom:1px solid rgba(255,255,255,.08);
      margin-bottom:18px;
    }

    .brand h1{
      margin:0;
      font-size:22px;
      font-weight:800;
      letter-spacing:.1px;
    }

    .brand p{
      margin:6px 0 0;
      color:rgba(255,255,255,.7);
      font-size:13px;
      line-height:1.45;
    }

    .sidebar-card{
      margin-top:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:14px;
    }

    .sidebar-card h3{
      margin:0 0 10px;
      font-size:14px;
      color:#fff;
    }

    .sidebar-card label{
      display:block;
      font-size:12px;
      color:rgba(255,255,255,.78);
      margin:0 0 6px;
      font-weight:600;
    }

    .sidebar-card input,
    .sidebar-card select{
      width:100%;
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      color:#0f172a;
      background:#fff;
      outline:none;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:18px;
    }

    .menu-btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px 16px;
      background:rgba(255,255,255,.08);
      color:#fff;
      text-align:left;
      font-size:15px;
      cursor:pointer;
      transition:.18s ease;
    }

    .menu-btn:hover{
      background:rgba(255,255,255,.14);
      transform:translateY(-1px);
    }

    .menu-btn.active{
      background:#fff;
      color:#0f172a;
      font-weight:700;
    }

    .main{
      padding:24px;
      min-width:0;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .title-wrap h2{
      margin:0;
      font-size:34px;
      line-height:1.05;
      letter-spacing:-.5px;
    }

    .title-wrap p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      background:#eff6ff;
      color:#1d4ed8;
    }

    .tag.gray{
      background:#f1f5f9;
      color:#475569;
    }

    .tag.success{
      background:#ecfdf5;
      color:#047857;
    }

    .tag.warning{
      background:#fffbeb;
      color:#b45309;
    }

    .tag.danger{
      background:#fef2f2;
      color:#b91c1c;
    }

    .btn,
    .input,
    .select,
    .textarea{
      border-radius:12px;
      padding:11px 12px;
      font-size:14px;
      outline:none;
    }

    .input,
    .select,
    .textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
    }

    .textarea{
      min-height:100px;
      resize:vertical;
    }

    .btn{
      border:none;
      cursor:pointer;
      background:var(--dark);
      color:#fff;
      font-weight:700;
      transition:.18s ease;
    }

    .btn:hover{background:var(--dark-2)}
    .btn.primary{background:var(--primary)}
    .btn.primary:hover{background:var(--primary-2)}
    .btn.secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn.secondary:hover{background:var(--panel-soft)}
    .btn.success{background:var(--success)}
    .btn.warning{background:var(--warning)}
    .btn.danger{background:var(--danger)}

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    .panel h3{
      margin:0 0 10px;
      font-size:20px;
      letter-spacing:-.2px;
    }

    .panel-sub{
      margin:-2px 0 14px;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
    }

    .grid{
      display:grid;
      gap:14px;
    }

    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .grid-5{grid-template-columns:repeat(5,minmax(0,1fr))}
    .grid-6{grid-template-columns:repeat(6,minmax(0,1fr))}

    .kpi{
      background:linear-gradient(180deg,#fff 0%, #f8fafc 100%);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      min-height:96px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .kpi .label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .kpi .value{
      font-size:30px;
      font-weight:800;
      line-height:1;
      letter-spacing:-.4px;
    }

    .kpi .sub{
      font-size:12px;
      color:var(--muted);
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .field.span-2{grid-column:span 2}
    .field.span-3{grid-column:span 3}
    .field.span-4{grid-column:span 4}
    .field.span-5{grid-column:span 5}

    .flex{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .notice{
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#f8fafc;
      color:#334155;
      font-size:14px;
      line-height:1.5;
    }

    .notice.success{
      background:#ecfdf5;
      border-color:#a7f3d0;
      color:#065f46;
    }

    .notice.warning{
      background:#fffbeb;
      border-color:#fde68a;
      color:#92400e;
    }

    .notice.danger{
      background:#fef2f2;
      border-color:#fecaca;
      color:#991b1b;
    }

    .empty{
      border:1px dashed var(--line);
      border-radius:16px;
      background:#fcfcfd;
      color:var(--muted);
      text-align:center;
      padding:24px;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:900px;
    }

    th, td{
      border-bottom:1px solid var(--line);
      padding:11px 12px;
      text-align:left;
      font-size:14px;
      white-space:nowrap;
      vertical-align:top;
    }

    th{
      background:#f8fafc;
      color:#334155;
      text-transform:uppercase;
      font-size:12px;
      letter-spacing:.4px;
      position:sticky;
      top:0;
      z-index:2;
    }

    tr:last-child td{border-bottom:none}
    .right{text-align:right}
    .muted{color:var(--muted)}
    .success-text{color:var(--success);font-weight:800}
    .warning-text{color:var(--warning);font-weight:800}
    .danger-text{color:var(--danger);font-weight:800}

    .matrix-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    .matrix-table{
      width:max-content;
      min-width:100%;
      border-collapse:collapse;
      background:#fff;
    }

    .matrix-table th,
    .matrix-table td{
      border-bottom:1px solid var(--line);
      border-right:1px solid var(--line);
      padding:10px 12px;
      font-size:13px;
      white-space:nowrap;
    }

    .matrix-table th{
      background:#f8fafc;
      color:#334155;
      font-size:12px;
      font-weight:800;
      text-transform:none;
      position:sticky;
      top:0;
      z-index:3;
    }

    .matrix-table th:first-child,
    .matrix-table td:first-child{
      position:sticky;
      left:0;
      z-index:2;
      background:#fff;
      min-width:360px;
      max-width:360px;
    }

    .matrix-table th:first-child{
      background:#f8fafc;
      z-index:4;
    }

    .matrix-row:hover td{
      background:#fafcff;
    }

    .tree-cell{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .tree-indent{
      display:inline-block;
      width:calc(var(--level, 0) * 18px);
      flex:0 0 auto;
    }

    .tree-toggle{
      width:24px;
      height:24px;
      border-radius:8px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:800;
      color:#475569;
      flex:0 0 auto;
    }

    .tree-toggle:hover{background:#f8fafc}
    .tree-spacer{width:24px;flex:0 0 auto}

    .tree-label{
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight:700;
    }

    .row-level-0 .tree-label{font-weight:800}
    .row-level-1 .tree-label{font-weight:700}
    .row-level-2 .tree-label{font-weight:600;color:#334155}

    .assistant-box{
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      background:#fff;
    }

    .assistant-output{
      margin-top:14px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#f8fafc;
      padding:16px;
      line-height:1.6;
      white-space:pre-wrap;
    }

    .mini-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .mini-item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid var(--line);
      font-size:14px;
    }

    .mini-item:last-child{border-bottom:none}

    .status-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:88px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }

    .status-open{
      background:#ecfdf5;
      color:#047857;
    }

    .status-closed{
      background:#fef2f2;
      color:#b91c1c;
    }

    @media (max-width: 1280px){
      .grid-6{grid-template-columns:repeat(3,minmax(0,1fr))}
      .grid-5{grid-template-columns:repeat(3,minmax(0,1fr))}
      .form-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    }

    @media (max-width: 980px){
      .app-shell{grid-template-columns:1fr}
      .sidebar{
        position:relative;
        height:auto;
      }
      .grid-4,.grid-3,.grid-2{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
      .field.span-2,.field.span-3,.field.span-4,.field.span-5{grid-column:span 1}
      .title-wrap h2{font-size:28px}
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>Control Raciones</h1>
        <p>Faena minera · matrices por fecha · cierre mensual · análisis asistido</p>
      </div>

      <div class="sidebar-card">
        <h3>Perfil</h3>
        <label>Modo de visualización</label>
        <select id="perfilSelector">
          <option value="ADMIN">Administrador</option>
          <option value="SUPERVISOR">Supervisor</option>
        </select>
      </div>

      <div class="sidebar-card">
        <h3>Período activo</h3>
        <label>Mes de trabajo</label>
        <input type="month" id="periodoSelector" />
      </div>

      <div class="sidebar-card">
        <h3>Filtros globales de análisis</h3>
        <label>Turno</label>
        <select id="turnoFiltroGlobal">
          <option value="">Todos</option>
        </select>
      </div>

      <nav class="menu" id="menu"></nav>

      <div class="sidebar-card">
        <h3>Acciones</h3>
        <div class="flex">
          <button class="btn secondary" id="btnExportExcel" style="width:100%">Exportar Excel</button>
          <button class="btn secondary" id="btnExportPDF" style="width:100%">Exportar PDF</button>
          <button class="btn danger" id="btnReset" style="width:100%">Reset local</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title-wrap">
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageSubtitle">Resumen operativo del período.</p>
        </div>

        <div class="toolbar">
          <span class="tag gray" id="perfilTag">ADMINISTRADOR</span>
          <span class="tag" id="periodoTag"></span>
          <span class="tag gray" id="turnoTag">TURNO: TODOS</span>
        </div>
      </div>

      <div id="appContent"></div>
    </main>
  </div>

  <datalist id="empresasList"></datalist>
  <datalist id="serviciosList"></datalist>

  <script>
    const DB_NAME = "control_raciones_db_v3";
    const DB_VERSION = 1;
    const DB_STORE = "appdata";
    const DB_KEY = "main";
    const SETTINGS_KEY = "control_raciones_settings_v3";
    const TURNOS_KEY = "control_raciones_turnos_v1";

    const MENU_ITEMS = [
      { key:"dashboard", label:"Dashboard", roles:["ADMIN"] },
      { key:"supervisores", label:"Venta supervisores", roles:["ADMIN","SUPERVISOR"] },
      { key:"produccion", label:"Producción", roles:["ADMIN"] },
      { key:"sistema", label:"Venta sistema", roles:["ADMIN"] },
      { key:"manual", label:"Venta manual", roles:["ADMIN"] },
      { key:"empresa", label:"Consumos por empresas", roles:["ADMIN"] },
      { key:"servicio", label:"Consumos por servicios", roles:["ADMIN"] },
      { key:"punto", label:"Consumos por puntos de servicio", roles:["ADMIN"] },
      { key:"comparativos", label:"Comparativos", roles:["ADMIN"] },
      { key:"curva", label:"Curva mensual", roles:["ADMIN"] },
      { key:"cobro", label:"Base de cobro", roles:["ADMIN"] },
      { key:"cierre", label:"Cierre mensual", roles:["ADMIN"] },
      { key:"turnos", label:"Configuración de turnos", roles:["ADMIN"] },
      { key:"asistente", label:"Asistente de análisis", roles:["ADMIN"] }
    ];

    const PUNTOS_SERVICIO = [
      "DP (PLANTA)",
      "DM (MINA)",
      "CAP",
      "AÑAÑUCAS",
      "CF",
      "CAES",
      "DELIVERY CAES",
      "DELIVERY CF",
      "COMEDOR SATELITAL 1",
      "COMEDOR SATELITAL 2"
    ];

    const EQUIPO_MAP = {
      "A":"DP (PLANTA)",
      "B":"DM (MINA)",
      "C":"CAP",
      "D":"AÑAÑUCAS",
      "E":"CF",
      "F":"CAES",
      "H":"DELIVERY CAES",
      "I":"DELIVERY CF",
      "J":"COMEDOR SATELITAL 1",
      "K":"COMEDOR SATELITAL 2"
    };

    const DEFAULT_DB = {
      ventaSupervisores: [],
      produccion: [],
      ventaSistema: [],
      ventaManual: [],
      curvaMensual: [],
      cierresMensuales: [],
      maestros: {
        empresas: [],
        servicios: [
          "DESAYUNO",
          "ALMUERZO",
          "CENA",
          "CENA TRASNOCHE",
          "COLACION REFORZADA",
          "COLACION CORDILLERA",
          "COLACION TERRENO",
          "PERMUTA DESAYUNO",
          "PERMUTA ALMUERZO",
          "PERMUTA CENA",
          "PERMUTA CENA 24H",
          "PERMUTA CENA TRASNOCHE",
          "AGUAS 500CC",
          "BIDONES",
          "COFFEE STANDARD",
          "COFFEE PLUS",
          "COFFEE BASICO"
        ],
        puntosServicio: [...PUNTOS_SERVICIO]
      }
    };

    const DEFAULT_SETTINGS = {
      perfil: "ADMIN",
      periodo: getCurrentMonth(),
      currentModule: "dashboard",
      filtroTurnoGlobal: ""
    };

    const DEFAULT_TURNOS = {
      fecha_inicio_ciclo: "",
      duracion_turno: 7,
      cantidad_turnos: 2,
      nombres_turnos: ["A","B"]
    };

    let db = structuredCloneSafe(DEFAULT_DB);
    let settings = loadSettings();
    let turnosConfig = loadTurnos();
    let currentExport = { headers:[], rows:[], filename:"exportacion" };

    const treeState = {
      empresa: new Set(),
      servicio: new Set(),
      punto: new Set(),
      supervisores: new Set(),
      produccion: new Set(),
      comparativo_supervisor: new Set()
    };

    const matrixFilters = {
      empresa: { empresa:"", servicio:"", punto_servicio:"" },
      servicio: { empresa:"", servicio:"", punto_servicio:"" },
      punto: { empresa:"", servicio:"", punto_servicio:"" }
    };

    function structuredCloneSafe(obj){
      return JSON.parse(JSON.stringify(obj));
    }

    function getCurrentMonth(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    }

    function loadSettings(){
      const raw = localStorage.getItem(SETTINGS_KEY);
      if(!raw){
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(DEFAULT_SETTINGS));
        return structuredCloneSafe(DEFAULT_SETTINGS);
      }
      try{
        return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
      }catch{
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(DEFAULT_SETTINGS));
        return structuredCloneSafe(DEFAULT_SETTINGS);
      }
    }

    function saveSettings(){
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function loadTurnos(){
      const raw = localStorage.getItem(TURNOS_KEY);
      if(!raw){
        localStorage.setItem(TURNOS_KEY, JSON.stringify(DEFAULT_TURNOS));
        return structuredCloneSafe(DEFAULT_TURNOS);
      }
      try{
        return { ...DEFAULT_TURNOS, ...JSON.parse(raw) };
      }catch{
        localStorage.setItem(TURNOS_KEY, JSON.stringify(DEFAULT_TURNOS));
        return structuredCloneSafe(DEFAULT_TURNOS);
      }
    }

    function saveTurnos(){
      localStorage.setItem(TURNOS_KEY, JSON.stringify(turnosConfig));
    }

    function openIndexedDb(){
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = function(event){
          const database = event.target.result;
          if(!database.objectStoreNames.contains(DB_STORE)){
            database.createObjectStore(DB_STORE);
          }
        };

        request.onsuccess = function(){
          resolve(request.result);
        };

        request.onerror = function(){
          reject(request.error);
        };
      });
    }

    async function loadDb(){
      try{
        const database = await openIndexedDb();

        return await new Promise((resolve, reject) => {
          const tx = database.transaction(DB_STORE, "readonly");
          const store = tx.objectStore(DB_STORE);
          const request = store.get(DB_KEY);

          request.onsuccess = function(){
            const parsed = request.result;
            if(!parsed){
              resolve(structuredCloneSafe(DEFAULT_DB));
              return;
            }

            resolve({
              ventaSupervisores: parsed.ventaSupervisores || [],
              produccion: parsed.produccion || [],
              ventaSistema: parsed.ventaSistema || [],
              ventaManual: parsed.ventaManual || [],
              curvaMensual: parsed.curvaMensual || [],
              cierresMensuales: parsed.cierresMensuales || [],
              maestros: {
                empresas: parsed?.maestros?.empresas || [],
                servicios: parsed?.maestros?.servicios || DEFAULT_DB.maestros.servicios,
                puntosServicio: parsed?.maestros?.puntosServicio || [...PUNTOS_SERVICIO]
              }
            });
          };

          request.onerror = function(){
            reject(request.error);
          };
        });
      }catch(error){
        console.error("Error cargando IndexedDB:", error);
        return structuredCloneSafe(DEFAULT_DB);
      }
    }

    async function saveDb(){
      try{
        const database = await openIndexedDb();

        await new Promise((resolve, reject) => {
          const tx = database.transaction(DB_STORE, "readwrite");
          const store = tx.objectStore(DB_STORE);
          const request = store.put(db, DB_KEY);

          request.onsuccess = function(){ resolve(); };
          request.onerror = function(){ reject(request.error); };
        });
      }catch(error){
        console.error("Error guardando IndexedDB:", error);
        throw error;
      }
    }

    function normalizeText(v){
      return String(v || "").trim().replace(/\s+/g," ").toUpperCase();
    }

    function normalizeServiceFamily(servicio){
      const s = normalizeText(servicio);
      if(s === "COLACION TERRENO") return "COLACION TERRENO";
      if(s.includes("PERMUTA")) return "COLACION TERRENO";
      return s;
    }

    function parseDateToISO(value){
      if(value === null || value === undefined || value === "") return "";

      if(typeof value === "number"){
        const d = XLSX.SSF.parse_date_code(value);
        if(d && d.y && d.m && d.d){
          return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`;
        }
      }

      const s = String(value).trim();
      if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

      let m = s.match(/^(\d{2})-(\d{2})-(\d{4})$/);
      if(m) return `${m[3]}-${m[2]}-${m[1]}`;

      m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if(m) return `${m[3]}-${m[2]}-${m[1]}`;

      m = s.match(/^(\d{4})\/(\d{2})\/(\d{2})$/);
      if(m) return `${m[1]}-${m[2]}-${m[3]}`;

      return "";
    }

    function getTurno(fecha){
      if(!turnosConfig.fecha_inicio_ciclo) return "";
      const inicio = new Date(turnosConfig.fecha_inicio_ciclo + "T00:00:00");
      const f = new Date(fecha + "T00:00:00");

      if(Number.isNaN(inicio.getTime()) || Number.isNaN(f.getTime())) return "";

      const diff = Math.floor((f - inicio) / (1000 * 60 * 60 * 24));
      const ciclo = Number(turnosConfig.duracion_turno || 0) * Number(turnosConfig.cantidad_turnos || 0);
      if(!ciclo || !turnosConfig.nombres_turnos?.length) return "";

      const pos = ((diff % ciclo) + ciclo) % ciclo;
      const index = Math.floor(pos / Number(turnosConfig.duracion_turno || 1));

      return turnosConfig.nombres_turnos[index] || "";
    }

    function filterConsumptionRows(rows, filters){
      return rows.filter(r => {
        if(filters.empresa && r.empresa !== filters.empresa) return false;
        if(filters.servicio && r.servicio !== filters.servicio) return false;
        if(filters.punto_servicio && r.punto_servicio !== filters.punto_servicio) return false;
        return true;
      });
    }

    function buildTree(rows, levels){
      const root = [];

      function findChild(children, label){
        let node = children.find(x => x.label === label);
        if(!node){
          node = {
            label,
            children: [],
            totalsByDate: {},
            total: 0
          };
          children.push(node);
        }
        return node;
      }

      rows.forEach(row => {
        let current = root;
        levels.forEach(level => {
          const label = row[level] || "SIN DATO";
          const node = findChild(current, label);
          const date = row.fecha;
          const amount = Number(row.cantidad || 0);

          node.totalsByDate[date] = (node.totalsByDate[date] || 0) + amount;
          node.total += amount;
          current = node.children;
        });
      });

      function sortNodes(nodes){
        nodes.sort((a,b)=>a.label.localeCompare(b.label));
        nodes.forEach(n => sortNodes(n.children));
      }

      sortNodes(root);
      return root;
    }

    function flattenTree(nodes, moduleKey, level = 0, parentPath = ""){
      const result = [];

      nodes.forEach(node => {
        const path = parentPath ? `${parentPath}|||${node.label}` : node.label;
        const hasChildren = node.children.length > 0;
        const expanded = treeState[moduleKey]?.has(path) || false;

        result.push({
          path,
          label: node.label,
          level,
          hasChildren,
          expanded,
          totalsByDate: node.totalsByDate,
          total: node.total
        });

        if(hasChildren && expanded){
          result.push(...flattenTree(node.children, moduleKey, level + 1, path));
        }
      });

      return result;
    }

    function renderMatrixTable(moduleKey, levels, rows, firstColumnLabel, filenameBase){
      const dates = getSelectedDates(rows);
      const tree = buildTree(rows, levels);
      const flat = flattenTree(tree, moduleKey);

      currentExport = {
        headers: [firstColumnLabel, ...dates, "Total"],
        rows: flat.map(r => [
          `${"  ".repeat(r.level)}${r.label}`,
          ...dates.map(d => r.totalsByDate[d] || 0),
          r.total
        ]),
        filename: `${filenameBase}_${settings.periodo}${settings.filtroTurnoGlobal ? `_turno_${settings.filtroTurnoGlobal}` : ""}`
      };

      if(!dates.length){
        return `<div class="empty">No hay información para el período seleccionado.</div>`;
      }

      return `
        <div class="matrix-wrap">
          <table class="matrix-table">
            <thead>
              <tr>
                <th>${firstColumnLabel}</th>
                ${dates.map(d => `<th class="right">${d}</th>`).join("")}
                <th class="right">Total</th>
              </tr>
            </thead>
            <tbody>
              ${
                flat.length
                  ? flat.map(r => `
                      <tr class="matrix-row row-level-${r.level}">
                        <td>
                          <div class="tree-cell">
                            <span class="tree-indent" style="--level:${r.level}"></span>
                            ${
                              r.hasChildren
                                ? `<button class="tree-toggle" data-tree-module="${moduleKey}" data-tree-path="${encodeURIComponent(r.path)}">${r.expanded ? "−" : "+"}</button>`
                                : `<span class="tree-spacer"></span>`
                            }
                            <span class="tree-label">${r.label}</span>
                          </div>
                        </td>
                        ${dates.map(d => `<td class="right">${formatNumber(r.totalsByDate[d] || 0)}</td>`).join("")}
                        <td class="right"><strong>${formatNumber(r.total)}</strong></td>
                      </tr>
                    `).join("")
                  : `<tr><td colspan="${dates.length + 2}"><div class="empty">No hay filas para mostrar.</div></td></tr>`
              }
            </tbody>
          </table>
        </div>
      `;
    }

    function bindTreeToggles(){
      document.querySelectorAll("[data-tree-module]").forEach(btn => {
        btn.addEventListener("click", () => {
          const moduleKey = btn.dataset.treeModule;
          const path = decodeURIComponent(btn.dataset.treePath);

          if(!treeState[moduleKey]) treeState[moduleKey] = new Set();

          if(treeState[moduleKey].has(path)){
            treeState[moduleKey].delete(path);
          }else{
            treeState[moduleKey].add(path);
          }

          renderApp();
        });
      });
    }

    function expandAllTree(nodes, moduleKey, parentPath = ""){
      nodes.forEach(node => {
        const path = parentPath ? `${parentPath}|||${node.label}` : node.label;
        if(node.children && node.children.length){
          treeState[moduleKey].add(path);
          expandAllTree(node.children, moduleKey, path);
        }
      });
    }

    function bindConsumptionFilterBar(moduleKey, levels, allRows){
      const empresaEl = document.getElementById(`${moduleKey}_filter_empresa`);

async function procesarArchivoSistema(rows){

  const out = document.getElementById("resultado_importacion");

  if(!rows || !rows.length){
    out.innerHTML = `<div class="notice danger">El archivo no contiene filas válidas.</div>`;
    return;
  }

  const headers = Object.keys(rows[0]).map(h => normalizeText(h));
  const required = ["NOMBRE_EMPRESA","SERVICIO","FECHA","EQUIPO","PRECIO"];
  const missing = required.filter(h => !headers.includes(h));

  if(missing.length){
    out.innerHTML = `<div class="notice danger">Faltan columnas obligatorias: <strong>${missing.join(", ")}</strong></div>`;
    return;
  }

  const grouped = {};
  let leidas = 0;
  let total = 0;

  rows.forEach(row => {
    const empresa = normalizeText(getHeaderValue(row, "NOMBRE_EMPRESA"));
    const servicio = normalizeText(getHeaderValue(row, "SERVICIO"));
    const fecha = parseDateToISO(getHeaderValue(row, "FECHA"));
    const equipo = normalizeText(getHeaderValue(row, "EQUIPO"));
    const punto = EQUIPO_MAP[equipo] || equipo || "SIN MAPEO";

    let cantidadRaw = getHeaderValue(row, "PRECIO");
    if(typeof cantidadRaw === "string"){
      cantidadRaw = cantidadRaw.replace(/\./g, "").replace(",", ".");
    }
    const cantidad = Number(cantidadRaw);

    if(!empresa || !servicio || !fecha || !punto || Number.isNaN(cantidad)) return;

    const key = `${fecha}|${empresa}|${servicio}|${punto}`;

    if(!grouped[key]){
      grouped[key] = {
        id: `${Date.now()}_${Math.random()}`,
        fecha,
        empresa,
        servicio,
        familia: normalizeServiceFamily(servicio),
        punto_servicio: punto,
        cantidad: 0
      };
    }

    grouped[key].cantidad += cantidad;
    leidas += 1;
    total += cantidad;
  });

  const importados = Object.values(grouped);

  importados.forEach(r => {
    db.ventaSistema.push(r);
    ensureMasters(r.empresa, r.servicio);
  });

  await saveDb();

  out.innerHTML = `
    <div class="notice success">
      ✔ Filas leídas: <strong>${formatNumber(leidas)}</strong><br>
      ✔ Registros consolidados: <strong>${formatNumber(importados.length)}</strong><br>
      ✔ Cantidad total importada: <strong>${formatNumber(total)}</strong>
    </div>
  `;

  renderApp();
}

async function importarArchivoSistema(){

  if(!guardPeriodoAbierto()) return;

  const input = document.getElementById("archivo_importar");
  const file = input.files[0];
  const out = document.getElementById("resultado_importacion");

  if(!file){
    alert("Selecciona un archivo antes de importar.");
    return;
  }

  out.innerHTML = `<div class="notice">Procesando archivo...</div>`;

  const reader = new FileReader();

  reader.onload = async function(e){
    try{
      const data = e.target.result;
      let workbook;

      if(file.name.toLowerCase().endsWith(".csv")){
        workbook = XLSX.read(data, { type:"string" });
      }else{
        workbook = XLSX.read(new Uint8Array(data), { type:"array" });
      }

      const firstSheet = workbook.SheetNames[0];
      const sheet = workbook.Sheets[firstSheet];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval:"" });

      await procesarArchivoSistema(rows);

    }catch(error){
      out.innerHTML = `<div class="notice danger">Error al leer el archivo: <strong>${error.message}</strong></div>`;
    }
  };

  if(file.name.toLowerCase().endsWith(".csv")){
    reader.readAsText(file, "utf-8");
  }else{
    reader.readAsArrayBuffer(file);
  }
}

function bindVentaSistemaEvents(){

  const btnImportar = document.getElementById("btn_importar_sistema");
  const btnLimpiar = document.getElementById("btn_limpiar_sistema");
  const btnVaciar = document.getElementById("btn_vaciar_sistema_mes");

  if(btnImportar){
    btnImportar.addEventListener("click", importarArchivoSistema);
  }

  if(btnLimpiar){
    btnLimpiar.addEventListener("click", () => {
      document.getElementById("archivo_importar").value = "";
      document.getElementById("resultado_importacion").innerHTML = "";
    });
  }

  if(btnVaciar){
    btnVaciar.addEventListener("click", async () => {
      if(!guardPeriodoAbierto()) return;
      if(!confirm(`Se eliminará toda la venta sistema del período ${settings.periodo}.`)) return;

      db.ventaSistema = db.ventaSistema.filter(x => monthOf(x.fecha) !== settings.periodo);
      await saveDb();
      renderApp();
    });
  }
}

function renderComparativos(){

  updateHeader(
    "Comparativos",
    "Supervisor vs Real y Real vs Curva."
  );

  const sup = applyGlobalTurnoFilter(getVentasSupervisoresMes());
  const real = applyGlobalTurnoFilter(getVentaRealMes());
  const curva = getCurvaMes();

  const totalSup = sup.reduce((a,b)=>a+Number(b.cantidad||0),0);
  const totalReal = real.reduce((a,b)=>a+Number(b.cantidad||0),0);
  const totalCurva = curva.reduce((a,b)=>a+Number(b.cantidad||0),0);

  const realAjustado = Math.max(totalReal,totalCurva);

  return `
  ${renderSummaryCards([
    {label:"Supervisor",value:formatNumber(totalSup)},
    {label:"Real",value:formatNumber(totalReal)},
    {label:"Curva",value:formatNumber(totalCurva)},
    {label:"Real Ajustado",value:formatNumber(realAjustado)}
  ])}
  `;
}

  const cobro = Math.max(totalReal,totalCurva);

  return `

function renderApp(){

  renderMenu();

  updateDatalists();

  const app = document.getElementById("appContent");

  switch(settings.currentModule){

    case "dashboard":
      app.innerHTML = renderDashboard();
      break;

    case "supervisores":
      app.innerHTML = renderVentaSupervisores();
      break;

    case "produccion":
      app.innerHTML = renderProduccion();
      break;

    case "sistema":
      app.innerHTML = renderVentaSistema();
      bindVentaSistemaEvents();
      bindTreeToggles();
      break;

    case "manual":
      app.innerHTML = renderVentaManual();
      break;

    case "empresa":
      app.innerHTML = renderConsumoEmpresa();
      break;

    case "servicio":
      app.innerHTML = renderConsumoServicio();
      break;

    case "punto":
      app.innerHTML = renderConsumoPunto();
      break;

    case "comparativos":
      app.innerHTML = renderComparativos();
      break;

    case "curva":
      app.innerHTML = renderCurva();
      break;

    case "cobro":
      app.innerHTML = renderCobro();
      break;

    case "cierre":
      app.innerHTML = renderCierre();
      break;

    case "turnos":
      app.innerHTML = renderTurnos();
      break;

    case "asistente":
      app.innerHTML = renderAsistente();
      break;

  }

  bindTreeToggles();
}

async function init(){

  db = await loadDb();

  document.getElementById("perfilSelector").value = settings.perfil;
  document.getElementById("periodoSelector").value = settings.periodo;

  document.getElementById("perfilSelector").addEventListener("change",e=>{
    settings.perfil = e.target.value;
    saveSettings();
    renderApp();
  });

  document.getElementById("periodoSelector").addEventListener("change",e=>{
    settings.periodo = e.target.value;
    saveSettings();
    renderApp();
  });

  document.getElementById("btnReset").addEventListener("click",()=>{
    if(confirm("Borrar base local?")){
      indexedDB.deleteDatabase(DB_NAME);
      location.reload();
    }
  });

  renderApp();
}

init();
