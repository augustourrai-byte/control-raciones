<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Operacional de Raciones</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    font-family: Arial, sans-serif;
}
</style>

</head>

<body class="bg-slate-100">

<div class="flex">

<!-- SIDEBAR -->
<div class="w-64 bg-slate-900 text-white min-h-screen p-4">

<h1 class="text-xl font-bold mb-6">
Control Raciones
</h1>

<ul class="space-y-2">

<li class="bg-slate-700 p-2 rounded">Dashboard</li>
<li class="p-2">Curva contratistas</li>
<li class="p-2">Asistencia real</li>
<li class="p-2">Producción sugerida</li>
<li class="p-2">Base de cobro</li>
<li class="p-2">Análisis</li>
<li class="p-2">Reporte mensual</li>

</ul>

</div>

<!-- CONTENIDO -->

<div class="flex-1 p-8">

<h2 class="text-2xl font-bold mb-6">
Dashboard Operacional
</h2>

<div class="grid grid-cols-4 gap-4">

<div class="bg-white p-4 rounded shadow">
<p class="text-gray-500 text-sm">Curva total</p>
<p class="text-3xl font-bold" id="curva">0</p>
</div>

<div class="bg-white p-4 rounded shadow">
<p class="text-gray-500 text-sm">Real</p>
<p class="text-3xl font-bold" id="real">0</p>
</div>

<div class="bg-white p-4 rounded shadow">
<p class="text-gray-500 text-sm">Cobro</p>
<p class="text-3xl font-bold" id="cobro">0</p>
</div>

<div class="bg-white p-4 rounded shadow">
<p class="text-gray-500 text-sm">Producción sugerida</p>
<p class="text-3xl font-bold" id="produccion">0</p>
</div>

</div>

<div class="mt-10 bg-white p-6 rounded shadow">

<h3 class="text-lg font-semibold mb-4">
Ingreso de raciones
</h3>

<div class="grid grid-cols-4 gap-4">

<input id="empresa" placeholder="Empresa"
class="border p-2 rounded">

<input id="servicio" placeholder="Servicio"
class="border p-2 rounded">

<input id="curvaInput" placeholder="Curva"
type="number"
class="border p-2 rounded">

<input id="realInput" placeholder="Real"
type="number"
class="border p-2 rounded">

</div>

<button onclick="guardar()"
class="mt-4 bg-slate-900 text-white px-4 py-2 rounded">

Guardar registro

</button>

</div>

<div class="mt-10 bg-white p-6 rounded shadow">

<h3 class="text-lg font-semibold mb-4">
Histórico
</h3>

<table class="w-full">

<thead>
<tr class="text-left border-b">
<th class="p-2">Empresa</th>
<th class="p-2">Servicio</th>
<th class="p-2">Curva</th>
<th class="p-2">Real</th>
<th class="p-2">Cobro</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

</div>

<script>

let datos = JSON.parse(localStorage.getItem("raciones") || "[]")

function guardar(){

let empresa = document.getElementById("empresa").value
let servicio = document.getElementById("servicio").value
let curva = Number(document.getElementById("curvaInput").value)
let real = Number(document.getElementById("realInput").value)

let cobro = Math.max(curva,real)

datos.push({
empresa,
servicio,
curva,
real,
cobro
})

localStorage.setItem("raciones",JSON.stringify(datos))

render()

}

function render(){

let tabla = document.getElementById("tabla")

tabla.innerHTML = ""

let curvaTotal = 0
let realTotal = 0
let cobroTotal = 0

datos.forEach(d=>{

curvaTotal += d.curva
realTotal += d.real
cobroTotal += d.cobro

tabla.innerHTML += `
<tr class="border-b">
<td class="p-2">${d.empresa}</td>
<td class="p-2">${d.servicio}</td>
<td class="p-2">${d.curva}</td>
<td class="p-2">${d.real}</td>
<td class="p-2">${d.cobro}</td>
</tr>
`

})

document.getElementById("curva").innerText = curvaTotal
document.getElementById("real").innerText = realTotal
document.getElementById("cobro").innerText = cobroTotal
document.getElementById("produccion").innerText = Math.max(curvaTotal,realTotal)

}

render()

</script>

</body>
</html>
