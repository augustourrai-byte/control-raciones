<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Operacional de Raciones</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#f3f5f9;
      --panel:#ffffff;
      --panel-2:#f8fafc;
      --line:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;
      --dark:#111827;
      --dark-2:#1f2937;
      --primary:#2563eb;
      --primary-2:#1d4ed8;
      --success:#059669;
      --warning:#d97706;
      --danger:#dc2626;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      display:grid;
      grid-template-columns: 300px 1fr;
      min-height:100vh;
    }

    .sidebar{
      background:linear-gradient(180deg,#111827 0%, #1f2937 100%);
      color:#fff;
      padding:22px 18px;
      position:sticky;
      top:0;
      height:100vh;
      overflow:auto;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:4px;
      margin-bottom:20px;
      padding:6px 8px 16px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .brand h1{
      margin:0;
      font-size:22px;
      font-weight:800;
      letter-spacing:.2px;
    }

    .brand p{
      margin:0;
      color:rgba(255,255,255,.65);
      font-size:13px;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:18px;
    }

    .menu-btn{
      width:100%;
      text-align:left;
      border:none;
      background:rgba(255,255,255,.08);
      color:#fff;
      padding:14px 16px;
      border-radius:14px;
      cursor:pointer;
      font-size:15px;
      transition:.18s ease;
    }

    .menu-btn:hover{
      background:rgba(255,255,255,.14);
      transform:translateY(-1px);
    }

    .menu-btn.active{
      background:#fff;
      color:#111827;
      font-weight:700;
    }

    .sidebar-card{
      margin-top:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:14px;
    }

    .sidebar-card h3{
      margin:0 0 10px;
      font-size:14px;
      color:#fff;
    }

    .sidebar-card label{
      font-size:12px;
      color:rgba(255,255,255,.75);
      display:block;
      margin:0 0 6px;
    }

    .sidebar-card select,
    .sidebar-card input{
      width:100%;
      border:none;
      border-radius:12px;
      padding:10px 12px;
      background:#fff;
      color:#111827;
      font-size:14px;
    }

    .main{
      padding:24px;
      min-width:0;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .page-title{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .page-title h2{
      margin:0;
      font-size:34px;
      line-height:1.05;
    }

    .page-title p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button,
    .field input,
    .field select,
    .field textarea{
      border:1px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:11px 12px;
      font-size:14px;
      color:var(--text);
      outline:none;
    }

    .toolbar button,
    .btn{
      cursor:pointer;
      background:var(--dark);
      color:#fff;
      border:none;
      padding:11px 14px;
      border-radius:12px;
      font-weight:700;
    }

    .btn:hover,
    .toolbar button:hover{
      background:var(--dark-2);
    }

    .btn.secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn.secondary:hover{
      background:var(--panel-2);
    }

    .btn.primary{
      background:var(--primary);
    }

    .btn.primary:hover{
      background:var(--primary-2);
    }

    .btn.danger{
      background:var(--danger);
    }

    .btn.danger:hover{
      filter:brightness(.95);
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    .panel h3{
      margin:0 0 12px;
      font-size:20px;
    }

    .panel-subtitle{
      margin:-4px 0 14px;
      color:var(--muted);
      font-size:14px;
    }

    .grid{
      display:grid;
      gap:14px;
    }

    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .grid.cols-5{grid-template-columns:repeat(5,minmax(0,1fr))}
    .grid.cols-6{grid-template-columns:repeat(6,minmax(0,1fr))}

    .kpi{
      background:linear-gradient(180deg,#fff 0%, #f8fafc 100%);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      min-height:100px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .kpi .label{
      color:var(--muted);
      font-size:13px;
      font-weight:600;
    }

    .kpi .value{
      font-size:32px;
      font-weight:800;
      letter-spacing:-.5px;
    }

    .kpi .sub{
      font-size:12px;
      color:var(--muted);
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .field textarea{
      min-height:92px;
      resize:vertical;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
    }

    th, td{
      padding:12px 12px;
      border-bottom:1px solid var(--line);
      text-align:left;
      font-size:14px;
      vertical-align:top;
      white-space:nowrap;
    }

    th{
      background:#f8fafc;
      color:#334155;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.35px;
    }

    tr:last-child td{border-bottom:none}

    .muted{color:var(--muted)}
    .tag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:#eff6ff;
      color:#1d4ed8;
    }

    .tag.success{background:#ecfdf5;color:#047857}
    .tag.warning{background:#fffbeb;color:#b45309}
    .tag.danger{background:#fef2f2;color:#b91c1c}
    .tag.gray{background:#f1f5f9;color:#475569}

    .accordion{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    details{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      overflow:hidden;
    }

    summary{
      list-style:none;
      cursor:pointer;
      padding:14px 16px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:#fbfdff;
    }

    summary::-webkit-details-marker{display:none}

    .summary-left{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .summary-right{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:13px;
      flex-wrap:wrap;
    }

    .details-body{
      padding:0 14px 14px;
      background:#fff;
    }

    .nested{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .empty{
      border:1px dashed var(--line);
      border-radius:16px;
      padding:22px;
      text-align:center;
      color:var(--muted);
      background:#fcfcfd;
    }

    .stat-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid var(--line);
      font-size:14px;
    }

    .stat-row:last-child{border-bottom:none}

    .flex{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    .right{text-align:right}
    .danger-text{color:var(--danger); font-weight:700}
    .success-text{color:var(--success); font-weight:700}
    .warning-text{color:var(--warning); font-weight:700}

    .hidden{display:none!important}

    .file-note{
      font-size:13px;
      color:var(--muted);
      margin-top:4px;
    }

    .notice{
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#f8fafc;
      color:#334155;
      font-size:14px;
      margin-top:12px;
    }

    @media (max-width: 1250px){
      .grid.cols-6{grid-template-columns:repeat(3,minmax(0,1fr))}
      .grid.cols-5{grid-template-columns:repeat(3,minmax(0,1fr))}
      .form-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    }

    @media (max-width: 980px){
      .app{grid-template-columns:1fr}
      .sidebar{
        position:relative;
        height:auto;
        border-bottom:1px solid rgba(255,255,255,.08);
      }
      .grid.cols-4,
      .grid.cols-3,
      .grid.cols-2{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
      .topbar{align-items:flex-start}
      .page-title h2{font-size:28px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Control Raciones</h1>
        <p>Faena minera · histórico mensual · base de cobro</p>
      </div>

      <div class="sidebar-card">
        <h3>Perfil</h3>
        <label>Modo de visualización</label>
        <select id="perfilSelector">
          <option value="ADMIN">Administrador</option>
          <option value="SUPERVISOR">Supervisor</option>
        </select>
      </div>

      <div class="sidebar-card">
        <h3>Período activo</h3>
        <label>Mes de trabajo</label>
        <input type="month" id="periodoSelector" />
      </div>

      <nav class="menu" id="menu"></nav>

      <div class="sidebar-card">
        <h3>Acciones</h3>
        <div class="flex">
          <button class="btn secondary" id="btnExportarCobro" style="width:100%">Exportar base cobro</button>
          <button class="btn secondary" id="btnExportarReal" style="width:100%">Exportar venta real</button>
          <button class="btn danger" id="btnReset" style="width:100%">Reset local</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="page-title">
          <h2 id="pageTitle">Venta supervisores</h2>
          <p id="pageSubtitle">Captura y control operacional por período.</p>
        </div>

        <div class="toolbar">
          <span class="tag gray" id="perfilTag">ADMINISTRADOR</span>
          <span class="tag" id="periodoTag"></span>
        </div>
      </div>

      <div id="appContent"></div>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "control_raciones_v4_full";
    const SETTINGS_KEY = "control_raciones_v4_settings";

    const CASINOS = [
      "DP (PLANTA)",
      "DM (MINA)",
      "CAP",
      "AÑAÑUCAS",
      "CF",
      "CAES",
      "PDA 1"
    ];

    const EQUIPO_MAP = {
      "A":"DP (PLANTA)",
      "B":"DM (MINA)",
      "C":"CAP",
      "D":"AÑAÑUCAS",
      "E":"CF",
      "F":"CAES",
      "G":"PDA 1"
    };

    const MENU_ITEMS = [
      { key: "supervisores", label: "Venta supervisores", roles: ["ADMIN","SUPERVISOR"] },
      { key: "produccion", label: "Producción", roles: ["ADMIN"] },
      { key: "sistema", label: "Venta sistema", roles: ["ADMIN"] },
      { key: "manual", label: "Venta manuales", roles: ["ADMIN"] },
      { key: "empresa", label: "Consumos por empresas", roles: ["ADMIN"] },
      { key: "servicio", label: "Consumos por servicios", roles: ["ADMIN"] },
      { key: "casino", label: "Consumos por casinos", roles: ["ADMIN"] },
      { key: "curva", label: "Curva mensual", roles: ["ADMIN"] },
      { key: "cobro", label: "Base de cobro", roles: ["ADMIN"] }
    ];

    const DEFAULT_DB = {
      ventaSupervisores: [],
      produccion: [],
      ventaSistema: [],
      ventaManual: [],
      curvaMensual: [],
      maestros: {
        empresas: [],
        servicios: [
          "DESAYUNO",
          "ALMUERZO",
          "CENA",
          "CENA TRASNOCHE",
          "COLACION REFORZADA",
          "COLACION CORDILLERA",
          "COLACION TERRENO",
          "PERMUTA DESAYUNO",
          "PERMUTA ALMUERZO",
          "PERMUTA CENA",
          "PERMUTA CENA 24H",
          "PERMUTA CENA TRASNOCHE",
          "AGUAS 500CC",
          "BIDONES",
          "COFFEE STANDARD",
          "COFFEE PLUS",
          "COFFEE BASICO"
        ]
      }
    };

    const DEFAULT_SETTINGS = {
      perfil: "ADMIN",
      periodo: getCurrentMonth(),
      currentModule: "supervisores"
    };

    let db = loadDb();
    let settings = loadSettings();

    function getCurrentMonth(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    }

    function structuredCloneSafe(obj){
      return JSON.parse(JSON.stringify(obj));
    }

    function loadDb(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw){
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_DB));
        return structuredCloneSafe(DEFAULT_DB);
      }
      try{
        const parsed = JSON.parse(raw);
        return {
          ventaSupervisores: parsed.ventaSupervisores || [],
          produccion: parsed.produccion || [],
          ventaSistema: parsed.ventaSistema || [],
          ventaManual: parsed.ventaManual || [],
          curvaMensual: parsed.curvaMensual || [],
          maestros: {
            empresas: parsed?.maestros?.empresas || [],
            servicios: parsed?.maestros?.servicios || DEFAULT_DB.maestros.servicios
          }
        };
      }catch{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_DB));
        return structuredCloneSafe(DEFAULT_DB);
      }
    }

    function loadSettings(){
      const raw = localStorage.getItem(SETTINGS_KEY);
      if(!raw){
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(DEFAULT_SETTINGS));
        return structuredCloneSafe(DEFAULT_SETTINGS);
      }
      try{
        return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
      }catch{
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(DEFAULT_SETTINGS));
        return structuredCloneSafe(DEFAULT_SETTINGS);
      }
    }

    function saveDb(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    function saveSettings(){
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function normalizeText(v){
      return String(v || "").trim().replace(/\s+/g," ").toUpperCase();
    }

    function normalizeServiceFamily(servicio){
      const s = normalizeText(servicio);
      if(s === "COLACION TERRENO") return "COLACION TERRENO";
      if(s.includes("PERMUTA")) return "COLACION TERRENO";
      return s;
    }

    function parseDateToISO(value){
      if(value === null || value === undefined || value === "") return "";
      if(typeof value === "number"){
        const d = XLSX.SSF.parse_date_code(value);
        if(d && d.y && d.m && d.d){
          return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`;
        }
      }
      const s = String(value).trim();
      if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      let m = s.match(/^(\d{2})-(\d{2})-(\d{4})$/);
      if(m) return `${m[3]}-${m[2]}-${m[1]}`;
      m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if(m) return `${m[3]}-${m[2]}-${m[1]}`;
      m = s.match(/^(\d{4})\/(\d{2})\/(\d{2})$/);
      if(m) return `${m[1]}-${m[2]}-${m[3]}`;
      return "";
    }

    function formatNumber(n){
      return new Intl.NumberFormat("es-CL", { maximumFractionDigits: 2 }).format(Number(n || 0));
    }

    function csvValue(v){
      const s = String(v ?? "");
      if(s.includes(";") || s.includes('"') || s.includes("\n")){
        return `"${s.replace(/"/g,'""')}"`;
      }
      return s;
    }

    function monthOf(fecha){
      return String(fecha || "").slice(0,7);
    }

    function inSelectedMonth(fecha){
      return monthOf(fecha) === settings.periodo;
    }

    function ensureMasters(empresa, servicio){
      const e = normalizeText(empresa);
      const s = normalizeText(servicio);
      if(e && !db.maestros.empresas.includes(e)) db.maestros.empresas.push(e);
      if(s && !db.maestros.servicios.includes(s)) db.maestros.servicios.push(s);
    }

    function getVisibleMenuItems(){
      return MENU_ITEMS.filter(item => item.roles.includes(settings.perfil));
    }

    function ensureCurrentModuleAllowed(){
      const allowed = getVisibleMenuItems().map(x => x.key);
      if(!allowed.includes(settings.currentModule)){
        settings.currentModule = allowed[0];
        saveSettings();
      }
    }

    function renderMenu(){
      ensureCurrentModuleAllowed();
      const menu = document.getElementById("menu");
      menu.innerHTML = getVisibleMenuItems().map(item => `
        <button class="menu-btn ${settings.currentModule === item.key ? "active" : ""}" data-module="${item.key}">
          ${item.label}
        </button>
      `).join("");

      menu.querySelectorAll(".menu-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          settings.currentModule = btn.dataset.module;
          saveSettings();
          renderApp();
        });
      });
    }

    function setHeader(title, subtitle){
      document.getElementById("pageTitle").textContent = title;
      document.getElementById("pageSubtitle").textContent = subtitle;
      document.getElementById("perfilTag").textContent = settings.perfil === "ADMIN" ? "ADMINISTRADOR" : "SUPERVISOR";
      document.getElementById("periodoTag").textContent = `PERÍODO ${settings.periodo}`;
    }

    function getVentasSistemaMes(){
      return db.ventaSistema.filter(x => inSelectedMonth(x.fecha));
    }

    function getVentasManualMes(){
      return db.ventaManual.filter(x => inSelectedMonth(x.fecha));
    }

    function getVentasSupervisoresMes(){
      return db.ventaSupervisores.filter(x => inSelectedMonth(x.fecha));
    }

    function getProduccionMes(){
      return db.produccion.filter(x => inSelectedMonth(x.fecha));
    }

    function getCurvaMes(){
      return db.curvaMensual.filter(x => x.periodo === settings.periodo);
    }

    function getVentaRealMes(){
      const sistema = getVentasSistemaMes().map(x => ({ ...x, origen:"SISTEMA" }));
      const manual = getVentasManualMes().map(x => ({ ...x, origen:"MANUAL" }));
      return [...sistema, ...manual];
    }

    function groupSum(rows, keyFn, amountFn){
      const map = new Map();
      rows.forEach(row => {
        const key = keyFn(row);
        map.set(key, (map.get(key) || 0) + Number(amountFn(row) || 0));
      });
      return map;
    }

    function sortDatesAsc(arr){
      return [...arr].sort((a,b) => a.localeCompare(b));
    }

    function sortDatesDesc(arr){
      return [...arr].sort((a,b) => b.localeCompare(a));
    }

    function nestedAccordionByDayCasinoServiceCompany(rows){
      const byDate = {};
      rows.forEach(r => {
        if(!byDate[r.fecha]) byDate[r.fecha] = {};
        if(!byDate[r.fecha][r.casino]) byDate[r.fecha][r.casino] = {};
        if(!byDate[r.fecha][r.casino][r.servicio]) byDate[r.fecha][r.casino][r.servicio] = {};
        if(!byDate[r.fecha][r.casino][r.servicio][r.empresa || "SIN EMPRESA"]) byDate[r.fecha][r.casino][r.servicio][r.empresa || "SIN EMPRESA"] = 0;
        byDate[r.fecha][r.casino][r.servicio][r.empresa || "SIN EMPRESA"] += Number(r.cantidad || 0);
      });

      const dates = sortDatesAsc(Object.keys(byDate));
      if(!dates.length) return `<div class="empty">No hay información para el período seleccionado.</div>`;

      return `<div class="accordion">` + dates.map(fecha => {
        const casinos = byDate[fecha];
        const totalDia = Object.values(casinos).flatMap(servs => Object.values(servs)).flatMap(emps => Object.values(emps)).reduce((a,b)=>a+b,0);

        return `
          <details ${dates.length <= 7 ? "open" : ""}>
            <summary>
              <div class="summary-left">
                <span>${fecha}</span>
                <span class="tag gray">${Object.keys(casinos).length} casinos</span>
              </div>
              <div class="summary-right">
                <strong>${formatNumber(totalDia)}</strong>
              </div>
            </summary>
            <div class="details-body">
              <div class="nested">
                ${Object.entries(casinos).sort((a,b)=>a[0].localeCompare(b[0])).map(([casino, servicios]) => {

    function nestedAccordionSimpleByDayCasinoService(rows){
      const byDate = {};
      rows.forEach(r => {
        if(!byDate[r.fecha]) byDate[r.fecha] = {};
        if(!byDate[r.fecha][r.casino]) byDate[r.fecha][r.casino] = {};
        if(!byDate[r.fecha][r.casino][r.servicio]) byDate[r.fecha][r.casino][r.servicio] = 0;
        byDate[r.fecha][r.casino][r.servicio] += Number(r.cantidad || 0);
      });

      const dates = sortDatesAsc(Object.keys(byDate));
      if(!dates.length) return `<div class="empty">No hay información para el período seleccionado.</div>`;

      return `<div class="accordion">` + dates.map(fecha => {
        const casinos = byDate[fecha];
        const totalDia = Object.values(casinos).flatMap(servicios => Object.values(servicios)).reduce((a,b)=>a+b,0);

        return `
          <details ${dates.length <= 7 ? "open" : ""}>
            <summary>
              <div class="summary-left">
                <span>${fecha}</span>
                <span class="tag gray">${Object.keys(casinos).length} casinos</span>
              </div>
              <div class="summary-right">
                <strong>${formatNumber(totalDia)}</strong>
              </div>

                  <details>

                      <div class="summary-left">

                      </div>
                      <div class="summary-right">
                        <strong>${formatNumber(Object.values(servicios).reduce((a,b)=>a+b,0))}</strong>

    function importSistemaFromFile(){
      const input = document.getElementById("fileSistema");
      const file = input.files[0];
      const out = document.getElementById("resultadoImportacionSistema");

      if(!file){
        alert("Selecciona un archivo antes de importar.");
        return;
      }

      out.innerHTML = `<div class="notice">Procesando archivo...</div>`;

      const reader = new FileReader();
      reader.onload = function(e){
        try{
          const data = e.target.result;
          let workbook;

          if(file.name.toLowerCase().endsWith(".csv")){
            workbook = XLSX.read(data, { type:"string" });
          }else{
            workbook = XLSX.read(new Uint8Array(data), { type:"array" });
          }

          const firstSheet = workbook.SheetNames[0];
          const sheet = workbook.Sheets[firstSheet];
          const rows = XLSX.utils.sheet_to_json(sheet, { defval:"" });

          if(!rows.length){
            out.innerHTML = `<div class="notice">El archivo no contiene filas válidas.</div>`;
            return;
          }

          const normalizedHeaders = Object.keys(rows[0]).map(h => normalizeText(h));
          const requiredHeaders = ["NOMBRE_EMPRESA","SERVICIO","FECHA","EQUIPO","PRECIO"];
          const missing = requiredHeaders.filter(h => !normalizedHeaders.includes(h));
          if(missing.length){
            out.innerHTML = `<div class="notice">Faltan columnas obligatorias: <strong>${missing.join(", ")}</strong></div>`;
            return;
          }

          const getValue = (row, name) => {
            const originalKey = Object.keys(row).find(k => normalizeText(k) === name);
            return originalKey ? row[originalKey] : "";
          };

          const grouped = {};
          let rawRows = 0;
          let total = 0;

          rows.forEach(row => {
            const empresa = normalizeText(getValue(row, "NOMBRE_EMPRESA"));
            const servicio = normalizeText(getValue(row, "SERVICIO"));
            const fecha = parseDateToISO(getValue(row, "FECHA"));
            const equipo = normalizeText(getValue(row, "EQUIPO"));
            const casino = EQUIPO_MAP[equipo] || equipo || "SIN MAPEO";

            let rawCantidad = getValue(row, "PRECIO");
            if(typeof rawCantidad === "string"){
              rawCantidad = rawCantidad.replace(/\./g,"").replace(",",".");
            }
            const cantidad = Number(rawCantidad);

            if(!empresa || !servicio || !fecha || !casino || Number.isNaN(cantidad)) return;

            const key = `${fecha}|${empresa}|${servicio}|${casino}`;
            if(!grouped[key]){
              grouped[key] = {
                id: `${Date.now()}_${Math.random()}`,
                fecha,
                empresa,
                servicio,
                familia: normalizeServiceFamily(servicio),
                casino,
                cantidad: 0
              };
            }

            grouped[key].cantidad += cantidad;
            rawRows += 1;
            total += cantidad;
          });

          const imported = Object.values(grouped);
          imported.forEach(r => {
            db.ventaSistema.push(r);
            ensureMasters(r.empresa, r.servicio);
          });

          saveDb();
          out.innerHTML = `
            <div class="notice">
              ✔ Filas fuente leídas: <strong>${formatNumber(rawRows)}</strong><br>
              ✔ Registros consolidados importados: <strong>${formatNumber(imported.length)}</strong><br>
              ✔ Cantidad total sumada: <strong>${formatNumber(total)}</strong>
            </div>
          `;
          renderApp();
        }catch(error){
          out.innerHTML = `<div class="notice">Error al leer el archivo: <strong>${error.message}</strong></div>`;
        }
      };

      if(file.name.toLowerCase().endsWith(".csv")){
        reader.readAsText(file, "utf-8");
      }else{
        reader.readAsArrayBuffer(file);
      }
    }

    function getCobroRows(){
      const realRows = getVentaRealMes();
      const map = new Map();

      realRows.forEach(r => {
        const key = `${settings.periodo}|${r.empresa}|${r.servicio}`;
        if(!map.has(key)){
          map.set(key, {
            periodo: settings.periodo,
            empresa: r.empresa,
            servicio: r.servicio,
            familia: r.familia,
            sistema: 0,
            manual: 0,
            real: 0,
            curva: 0,
            cobro: 0,
            regla: ""
          });
        }
        const obj = map.get(key);
        if(r.origen === "SISTEMA") obj.sistema += Number(r.cantidad || 0);
        if(r.origen === "MANUAL") obj.manual += Number(r.cantidad || 0);
        obj.real += Number(r.cantidad || 0);
      });

      getCurvaMes().forEach(r => {
        const key = `${r.periodo}|${r.empresa}|${r.servicio}`;
        if(!map.has(key)){
          map.set(key, {
            periodo: r.periodo,
            empresa: r.empresa,
            servicio: r.servicio,
            familia: r.familia,
            sistema: 0,
            manual: 0,
            real: 0,
            curva: 0,
            cobro: 0,
            regla: ""
          });
        }
        map.get(key).curva += Number(r.cantidad || 0);
      });

      return [...map.values()].map(r => {
        const cobro = Math.max(r.real, r.curva);
        let regla = "REAL = CURVA";
        if(cobro === r.real && cobro !== r.curva) regla = "COBRA REAL";
        if(cobro === r.curva && cobro !== r.real) regla = "COBRA CURVA";
        return { ...r, cobro, regla };
      }).sort((a,b)=>(a.empresa+a.servicio).localeCompare(b.empresa+b.servicio));
    }

      const totalReal = rows.reduce((a,b)=>a+Number(b.real||0),0);
      const totalCurva = rows.reduce((a,b)=>a+Number(b.curva||0),0);
      const totalCobro = rows.reduce((a,b)=>a+Number(b.cobro||0),0);

      document.getElementById("appContent").innerHTML = `
        <div class="panel">
          <h3>Resumen ejecutivo</h3>
          ${renderSummaryCards([
            { label:"Venta sistema", value:formatNumber(totalSistema), sub:"Origen sistema" },
            { label:"Venta manual", value:formatNumber(totalManual), sub:"Origen manual" },
            { label:"Venta real", value:formatNumber(totalReal), sub:"Sistema + manual" },
            { label:"Curva", value:formatNumber(totalCurva), sub:"Base contractual" }
          ])}

          <div style="height:14px"></div>

          ${renderSummaryCards([
            { label:"Cobro período", value:formatNumber(totalCobro), sub:"Mayor entre real y curva" },
            { label:"Registros", value:formatNumber(rows.length), sub:"Empresa + servicio" },
            { label:"Cobran real", value:formatNumber(rows.filter(x=>x.regla==="COBRA REAL").length), sub:"Mayor real" },
            { label:"Cobran curva", value:formatNumber(rows.filter(x=>x.regla==="COBRA CURVA").length), sub:"Mayor curva" }
          ])}
        </div>

        <div class="panel">
          <h3>Base de cobro del período</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Período</th>
                  <th>Empresa</th>
                  <th>Servicio</th>
                  <th>Familia</th>
                  <th class="right">Sistema</th>
                  <th class="right">Manual</th>
                  <th class="right">Real</th>
                  <th class="right">Curva</th>
                  <th class="right">Cobro</th>
                  <th>Regla</th>
                </tr>
              </thead>
              <tbody>
                ${
                  rows.length
                  ? rows.map(r => `
                      <tr>
                        <td>${r.periodo}</td>
                        <td>${r.empresa}</td>
                        <td>${r.servicio}</td>
                        <td>${r.familia}</td>
                        <td class="right">${formatNumber(r.sistema)}</td>
                        <td class="right">${formatNumber(r.manual)}</td>
                        <td class="right"><strong>${formatNumber(r.real)}</strong></td>
                        <td class="right">${formatNumber(r.curva)}</td>
                        <td class="right"><strong>${formatNumber(r.cobro)}</strong></td>
                        <td>${
                          r.regla === "COBRA REAL" ? `<span class="tag success">${r.regla}</span>` :
                          r.regla === "COBRA CURVA" ? `<span class="tag warning">${r.regla}</span>` :
                          `<span class="tag gray">${r.regla}</span>`
                        }</td>
                      </tr>
                    `).join("")
                  : `<tr><td colspan="10"><div class="empty">No hay información suficiente para calcular base de cobro en este período.</div></td></tr>`
                }
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function exportCobroCSV(){
      const rows = getCobroRows();
      const headers = ["periodo","empresa","servicio","familia","sistema","manual","real","curva","cobro","regla"];
      const csv = [
        headers.join(";"),
        ...rows.map(r => headers.map(h => csvValue(r[h] ?? "")).join(";"))
      ].join("\n");

      const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `base_cobro_${settings.periodo}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportVentaRealCSV(){
      const rows = getVentaRealMes();
      const headers = ["fecha","empresa","servicio","familia","casino","cantidad","origen"];
      const csv = [
        headers.join(";"),
        ...rows.map(r => headers.map(h => csvValue(r[h] ?? "")).join(";"))
      ].join("\n");

      const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `venta_real_${settings.periodo}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function bindGlobalControls(){
      const perfilSelector = document.getElementById("perfilSelector");
      const periodoSelector = document.getElementById("periodoSelector");

      perfilSelector.value = settings.perfil;
      periodoSelector.value = settings.periodo;

      perfilSelector.addEventListener("change", () => {
        settings.perfil = perfilSelector.value;
        saveSettings();
        renderApp();
      });

      periodoSelector.addEventListener("change", () => {
        settings.periodo = periodoSelector.value || getCurrentMonth();
        saveSettings();
        renderApp();
      });

      document.getElementById("btnExportarCobro").addEventListener("click", exportCobroCSV);
      document.getElementById("btnExportarReal").addEventListener("click", exportVentaRealCSV);
      document.getElementById("btnReset").addEventListener("click", () => {
        if(!confirm("Esto borrará toda la información guardada en este navegador.")) return;
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(SETTINGS_KEY);
        db = loadDb();
        settings = loadSettings();
        renderApp();
      });
    }

    function ensureDatalists(){
      if(!document.getElementById("empresasList")){
        const dl = document.createElement("datalist");
        dl.id = "empresasList";
        document.body.appendChild(dl);
      }
      if(!document.getElementById("serviciosList")){
        const dl = document.createElement("datalist");
        dl.id = "serviciosList";
        document.body.appendChild(dl);
      }

      document.getElementById("empresasList").innerHTML = db.maestros.empresas
        .slice().sort((a,b)=>a.localeCompare(b))
        .map(x=>`<option value="${x}"></option>`).join("");

      document.getElementById("serviciosList").innerHTML = db.maestros.servicios
        .slice().sort((a,b)=>a.localeCompare(b))
        .map(x=>`<option value="${x}"></option>`).join("");
    }

    function renderApp(){
      ensureCurrentModuleAllowed();
      renderMenu();
      ensureDatalists();

      switch(settings.currentModule){
        case "supervisores":
          renderSupervisorModule();
          break;
        case "produccion":
          renderProduccionModule();
          break;
        case "sistema":
          renderSistemaModule();
          break;
        case "manual":
          renderManualModule();
          break;
        case "empresa":
          renderConsumoEmpresaModule();
          break;
        case "servicio":
          renderConsumoServicioModule();
          break;
        case "casino":
          renderConsumoCasinoModule();
          break;
        case "curva":
          renderCurvaModule();
          break;
        case "cobro":
          renderCobroModule();
          break;
        default:
          settings.currentModule = "supervisores";
          saveSettings();
          renderSupervisorModule();
          break;
      }
    }

    bindGlobalControls();
    renderApp();
  </script>
</body>
</html>
